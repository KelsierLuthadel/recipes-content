    name: neutral grain spirit at 40-45% abv - russian standard
    raw: 1 litre of neutral grain spirit at 40-45% ABV - Russian Standard, Smirnoff Red, Absolut or Stolichnaya vodka are all good choices. Don't use cheap supermarket-own-brand vodka or premium vodka . About £18-£22 per litre.
