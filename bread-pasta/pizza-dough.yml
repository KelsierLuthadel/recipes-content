prep: 15 minutes
cook: 5 minutes
allergens:
  - gluten
  - dairy
tags:
  - vegetarian
  - quick
  - make-ahead
mentions:
  - tutorials/bread/hydration
  - tutorials/pizza/cheese
  - tutorials/pizza/dough
  - tutorials/pizza/sauce
  - tutorials/pizza/toppings
ingredients:
  - qty: 225
    unit: g
    name: white bread flour
    raw: 225 grams strong white bread flour
  - qty: 7
    unit: g
    name: fast-acting dried yeast
    raw: 7 grams fast-acting dried yeast
  - qty: 1
    unit: tsp
    name: caster sugar
    raw: 1 teaspoon caster sugar
  - qty: 0.5
    unit: tsp
    name: sea salt
    raw: ½ teaspoon fine sea salt
  - qty: 2
    unit: tbsp
    name: virgin olive oil
    raw: 2 tablespoons extra virgin olive oil
  - qty: 85
    unit: ml
    name: milk
    raw: 85 ml whole milk
  - qty: 85
    unit: ml
    name: water
    raw: 85 ml warm water
