prep: 10 minutes
allergens:
  - fish
  - garlic
tags:
  - dairy-free
  - gluten-free
  - spicy
  - quick
  - fish
  - garlic
  - tomato
  - lime
  - coriander
  - chili
regions:
  - indonesian
mentions:
  - tutorials/pizza/sauce
  - tutorials/spices/storage
ingredients:
  - qty: 3.5
    name: tomatoes
    raw: 3-4 ripe tomatoes
  - qty: 1.5
    name: red chillies
    raw: 1-2 fresh red chillies
  - qty: 3.5
    unit: tbsp
    name: fish sauce
    raw: 3-4 tablespoons fish sauce
  - qty: 0.25
    unit: tsp
    name: sea salt
    raw: ¼ teaspoon fine sea salt
  - qty: 2.5
    unit: tbsp
    name: coriander
    raw: 2-3 tablespoons fresh coriander leaves
  - qty: 1
    name: garlic
    raw: 1 garlic clove
  - qty: 0.5
    unit: tsp
    name: palm sugar
    raw: ½ teaspoon palm sugar
  - qty: 1
    unit: tbsp
    name: lime juice
    raw: 1 tablespoon fresh lime juice
