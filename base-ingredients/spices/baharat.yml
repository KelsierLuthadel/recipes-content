    unit: tbsp
    name: black peppercorns
    raw: 2 tablespoons black peppercorns
  - qty: 4
    unit: tbsp
    name: paprika
    raw: 4 tablespoons paprika
  - qty: 1
    unit: tsp
    name: allspice
    raw: 1 teaspoon ground allspice
  - qty: 2
    unit: tsp
    name: nutmeg
    raw: 2 teaspoons freshly grated nutmeg
  - qty: 2
    unit: tsp
    name: chilli powder
    raw: 2 teaspoons chilli powder
  - qty: 1.5
    unit: tsp
    name: sea salt
    raw: 1 ½ teaspoons fine sea salt
