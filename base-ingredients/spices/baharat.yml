ingredients:
  - qty: 1
    name: cinnamon stick
    raw: 1 cinnamon stick
  - qty: 2
    unit: tbsp
    name: coriander seeds
    raw: 2 tablespoons coriander seeds
  - qty: 2
    unit: tbsp
    name: cumin seeds
    raw: 2 tablespoons cumin seeds
  - qty: 1
    unit: tsp
    name: cardamom seeds
    raw: 1 teaspoon cardamom seeds
  - qty: 2
    unit: tsp
    name: cloves
    raw: 2 teaspoons cloves
