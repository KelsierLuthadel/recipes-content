ingredients:
  - qty: 1.5
    unit: tsp
    name: coriander seeds
    raw: 1 ½ tsp coriander seeds
  - qty: 1.5
    unit: tsp
    name: cardamom seeds
    raw: 1 ½ tsp cardamom seeds
  - qty: 0.5
    unit: tsp
    name: green cardamom seeds
    raw: ½ tsp green cardamom seeds
  - qty: 1.5
    unit: tsp
    name: white pepper
    raw: 1 ½ tsp white pepper
  - qty: 12
    name: red bird’s eye chillies
    raw: 12 dried red bird’s eye chillies, soaked in water for 30 minutes and cut into small pieces
  - qty: 12
    name: garlic
    raw: 12 garlic cloves
  - qty: 1
    name: galangal
    raw: 1 thumb-sized piece galangal, thinly sliced
  - qty: 1
    name: turmeric
    raw: 1 thumb-sized piece fresh turmeric, peeled and thinly sliced, or 1-1 ½ tsp ground turmeric
  - qty: 3
    name: lime leaves
    raw: 3 lime leaves, stalks removed and finely chopped
  - qty: 3
    name: shallots
    raw: 3 shallots , halved
  - qty: 10
    name: coriander stalks
    raw: 10 thick coriander stalks
  - qty: 2
    unit: tbsp
    name: lemongrass
    raw: 2 tbsp sliced lemongrass
  - qty: 1
    unit: tsp
    name: shrimp paste
    raw: 1 tsp shrimp paste
