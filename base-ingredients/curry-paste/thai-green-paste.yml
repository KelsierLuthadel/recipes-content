prep: 20 minutes
allergens:
  - peanuts
  - shellfish
  - garlic
tags:
  - dairy-free
  - gluten-free
  - spicy
  - quick
  - pastes
  - fish
  - prawn
  - onion
  - garlic
  - coriander
  - nuts
  - chili
  - curry
mentions:
  - cuisine/thai/pastes/thai-green-curry-paste
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/spices/storage
  - tutorials/thai-curry/green
  - tutorials/thai-curry/building-a-curry
ingredients:
  - qty: 4
    name: green chillies
    raw: 4 fresh green chillies
  - qty: 1
    name: onion
    raw: 1 onion
  - qty: 1
    unit: tbsp
    name: garlic
    raw: 1 tablespoon fresh garlic
  - qty: 8
    unit: tbsp
    name: coriander
    raw: 8 tablespoons fresh coriander
  - qty: 2
    name: lemon grass
    raw: 2 pieces lemon grass
  - qty: 1
    unit: tbsp
    name: galangal
    raw: 1 tablespoon fresh galangal
  - qty: 2
    unit: tsp
    name: coriander
    raw: 2 teaspoons ground coriander
  - qty: 1
    unit: tsp
    name: cumin
    raw: 1 teaspoon ground cumin
  - qty: 1
    unit: tsp
    name: black peppercorns
    raw: 1 teaspoon black peppercorns
  - qty: 1
    unit: tsp
    name: turmeric
    raw: 1 teaspoon ground turmeric
  - qty: 1
    unit: tsp
    name: shrimp paste
    raw: 1 teaspoon shrimp paste
  - name: sea salt
    raw: Fine sea salt
  - qty: 2
    unit: tbsp
    name: peanut oil
    raw: 2 tablespoons peanut oil
