ingredients:
  - qty: 15
    name: chillies (red)
    raw: 15 dried long red chillies
  - qty: 1
    unit: cup
    name: water
    raw: 1 cup hot water
  - qty: 3
    name: lemon grass
    raw: 3 lemongrass stalks
  - qty: 20
    unit: g
    name: galangal
    raw: 20 g fresh galangal
  - name: kaffir lime
    raw: Zest of 1 kaffir lime
  - qty: 2
    unit: tbsp
    name: coriander
    raw: 2 tbsp finely chopped coriander root
  - qty: 8
    name: garlic
    raw: 8 garlic cloves
  - qty: 75
    unit: g
    name: shallots
    raw: 75 g shallots
  - qty: 1
    unit: tbsp
    name: shrimp paste
    raw: 1 tbsp shrimp paste
  - qty: 1
    unit: tsp
    name: coriander seeds
    raw: 1 tsp coriander seeds
  - qty: 0.5
    unit: tsp
    name: cumin seeds
    raw: ½ tsp cumin seeds
  - qty: 1
    unit: tsp
    name: peppercorns (white)
    raw: 1 tsp white peppercorns
  - qty: 1
    unit: tsp
    name: sea salt
    raw: 1 tsp fine sea salt
