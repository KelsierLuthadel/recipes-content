    unit: tsp
    name: mint leaves
    raw: 1 ½ teaspoons dried mint leaves
  - qty: 6
    name: bay leaves
    raw: 6 bay leaves
  - qty: 1
    unit: tbsp
    name: dry rose petals
    raw: 1 tablespoon dry rose petals
  - qty: 1
    unit: tsp
    name: saffron stamens
    raw: 1 teaspoon saffron stamens
