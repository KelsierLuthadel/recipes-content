prep: 10 minutes
allergens:
  - mustard
tags:
  - vegetarian
  - vegan
  - dairy-free
  - gluten-free
  - spicy
  - quick
  - ginger
  - coriander
  - chili
  - curry
mentions:
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/pizza/sauce
ingredients:
  - qty: 8
    name: red chillies
    raw: 8 dried red chillies
  - qty: 7
    unit: tbsp
    name: coriander seeds
    raw: 7 tablespoons coriander seeds
  - qty: 4
    unit: tbsp
    name: cumin seeds
    raw: 4 tablespoons cumin seeds
  - qty: 2
    unit: tsp
    name: fenugreek seeds
    raw: 2 teaspoons fenugreek seeds
  - qty: 2
    unit: tsp
    name: black mustard seeds
    raw: 2 teaspoons black mustard seeds
  - qty: 2
    unit: tsp
    name: black peppercorns
    raw: 2 teaspoons black peppercorns
  - qty: 1
    unit: tbsp
    name: turmeric
    raw: 1 tablespoon ground turmeric
  - qty: 1
    unit: tsp
    name: ginger
    raw: 1 teaspoon ground ginger
