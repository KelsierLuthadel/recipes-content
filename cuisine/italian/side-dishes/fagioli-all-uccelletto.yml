    name: sage leaves
    raw: 12-16 fresh sage leaves
  - qty: 1
    unit: tsp
    name: red pepper flakes
    raw: 1 teaspoon red pepper flakes
  - qty: 1
    name: tomatoes;
    raw: 1 tin chopped tomatoes; or 4 fresh tomatoes
  - qty: 1.5
    unit: tsp
    name: sea salt
    raw: 1 ½ teaspoons fine sea salt
  - qty: 1
    unit: tsp
    name: black pepper
    raw: 1 teaspoon ground black pepper
  - qty: 1
    unit: tsp
    name: oregano
    raw: 1 teaspoon dried oregano
  - name: olive oil
    raw: Extra olive oil
  - name: sage leaves
    raw: Fresh sage leaves
