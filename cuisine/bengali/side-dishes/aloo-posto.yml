    raw: 4 potatoes , peeled and cut into 1 ½ cm cubes
  - qty: 4
    unit: tbsp
    name: mustard oil
    raw: 4 tbsp mustard oil
  - qty: 0.5
    unit: tsp
    name: nigella seeds
    raw: ½ tsp nigella seeds
