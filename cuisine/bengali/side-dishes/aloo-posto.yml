    name: green chilli
    raw: 1 green chilli, slit lengthways
  - qty: 0.5
    unit: tsp
    name: turmeric
    raw: ½ tsp turmeric
  - qty: 1
    unit: tsp
    name: salt
    raw: 1 tsp salt, or to taste
  - qty: 1
    unit: tsp
    name: sugar
    raw: 1 tsp sugar
  - qty: 150
    unit: ml
    name: water
    raw: 150 ml warm water
  - qty: 1
    unit: tsp
    name: mustard oil
    raw: 1 tsp raw mustard oil, to finish
