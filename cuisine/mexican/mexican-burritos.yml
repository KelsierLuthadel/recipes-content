    name: cumin
    raw: 2 tsp ground cumin
  - qty: 1
    unit: tsp
    name: mexican oregano
    raw: 1 tsp Mexican oregano
  - qty: 1
    unit: tsp
    name: salt
    raw: 1 tsp salt
  - qty: 500
    unit: ml
    name: beef stock
    raw: 500 ml beef stock
  - qty: 2
    unit: tbsp
