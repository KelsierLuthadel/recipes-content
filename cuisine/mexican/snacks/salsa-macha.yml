  - qty: 2
    unit: tsp
    name: sea salt
    raw: 2 teaspoons fine sea salt
  - qty: 2
    unit: tbsp
    name: brown sugar
    raw: 2 tablespoons brown sugar
  - qty: 1
    unit: tbsp
    name: white wine vinegar
    raw: 1 tablespoon white wine vinegar
  - qty: 350
    unit: ml
    name: vegetable oil
    raw: 350 ml vegetable oil
