  - qty: 4
    name: tomatoes
    raw: 4 ripe tomatoes, roughly chopped
  - qty: 2
    unit: tbsp
    name: sweet paprika
    raw: 2 tbsp sweet paprika
  - qty: 1
    unit: tsp
    name: pepper (black)
    raw: 1 tsp ground black pepper
  - qty: 1
    unit: tsp
    name: savory
    raw: 1 tsp dried savory or marjoram
  - qty: 2
    name: bay leaves
    raw: 2 bay leaves
  - qty: 1
    unit: tbsp
    name: tomato paste
    raw: 1 tbsp tomato paste
  - qty: 200
    unit: ml
    name: water
    raw: 200 ml hot water
  - name: salt
    raw: Salt to taste
  - qty: 1
    unit: handful
    name: flat leaf parsley
    raw: A handful of flat-leaf parsley, chopped
