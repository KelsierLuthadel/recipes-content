prep: 15 minutes (plus 1 hour 30 minutes rising)
cook: 20 minutes (with a baking stone)
allergens:
  - gluten
  - sesame
tags:
  - vegetarian
  - vegan
  - dairy-free
  - make-ahead
  - sides
  - complex
mentions:
  - tutorials/pizza/dough
  - tutorials/spices/storage
ingredients:
  - qty: 500
    unit: g
    name: plain flour
    raw: 500 g plain flour
  - qty: 1
    name: fast action yeast
    raw: 1 sachet fast-action yeast
  - qty: 1.5
    unit: tsp
    name: salt
    raw: 1 ½ teaspoons salt
  - qty: 1
    unit: tbsp
    name: caster sugar
    raw: 1 tablespoon caster sugar
  - qty: 2
    unit: tbsp
    name: olive oil
    raw: 2 tablespoons olive oil
  - qty: 320
    unit: ml
    name: water
    raw: 320 ml warm water
  - qty: 1
    unit: tsp
    name: sesame (black)
    raw: 1 teaspoon black sesame
