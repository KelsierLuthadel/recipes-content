    name: tomatoes
    raw: 3 ripe tomatoes, peeled and chopped
  - qty: 4
    unit: clove
    name: garlic
    raw: 4 cloves garlic, minced
  - qty: 1
    unit: tsp
    name: cumin
    raw: 1 tsp ground cumin
  - qty: 1
    name: bay leaf
    raw: 1 bay leaf
  - qty: 2
    unit: tbsp
    name: lard
    raw: 2 tbsp lard or vegetable oil
  - qty: 200
    unit: g
    name: long grain white rice
    raw: 200 g long-grain white rice, rinsed
  - qty: 2
    unit: l
    name: beef stock
    raw: 2 litres beef stock or water
  - qty: 2
    unit: tsp
    name: salt
    raw: 2 tsp salt
  - name: pepper (black)
    raw: Black pepper
  - qty: 1
    unit: large handful
    name: flat leaf parsley
    raw: 1 large handful flat-leaf parsley, chopped
  - qty: 2
    name: spring onions
    raw: 2 spring onions, sliced
