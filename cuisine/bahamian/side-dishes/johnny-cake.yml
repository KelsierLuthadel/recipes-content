prep: 15 minutes
cook: 30 minutes
allergens:
  - gluten
  - dairy
  - eggs
tags:
  - vegetarian
  - sides
  - eggs
  - butter
mentions:
  - tutorials/pizza/dough
  - tutorials/spices/storage
ingredients:
  - qty: 400
    unit: g
    name: plain flour
    raw: 400 g plain flour
  - qty: 2
    unit: tbsp
    name: caster sugar
    raw: 2 tablespoons caster sugar
  - qty: 4
    unit: tsp
    name: baking powder
    raw: 4 teaspoons baking powder
  - qty: 1
    unit: tsp
    name: sea salt
    raw: 1 teaspoon fine sea salt
