prep: 10 minutes
cook: 10 minutes
allergens:
  - meat
  - garlic
tags:
  - dairy-free
  - gluten-free
  - spicy
  - quick
  - make-ahead
  - meals
  - asian
  - meat
  - lamb
  - garlic
  - ginger
  - lime
  - coriander
  - chili
  - complex
mentions:
  - tutorials/cocktails/garnish
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/pizza/sauce
  - tutorials/spices/storage
  - base-ingredients/curry-powder/garam-masala-kashmiri
  - base-ingredients/curry-powder/garam-masala
  - base-ingredients/curry-powder/mix-powder-glasgow
  - base-ingredients/curry-powder/mixed-powder
ingredients:
  - qty: 3
    unit: tbsp
    name: rapeseed oil
    raw: 3 tbsp rapeseed oil or seasoned oil
  - qty: 3
    name: kashmiri dried red chillies
    raw: 2-4 Kashmiri dried red chillies, to taste
  - name: cardamom pods (green)
    raw: A few green cardamom pods, lightly bruised
  - qty: 3
    unit: tbsp
    name: garlic and ginger paste
    raw: 3 tbsp garlic and ginger paste
  - qty: 2
    name: chillies (green)
    raw: 2 fresh green chillies, or to taste, finely chopped
  - qty: 125
    unit: ml
    name: tomato puree
    raw: 125 ml tomato purée
  - qty: 2
    unit: tbsp
    name: cumin
    raw: 2 tbsp ground cumin
  - qty: 1
    unit: tsp
    name: coriander
    raw: 1 tsp ground coriander
  - qty: 0.25
    unit: tsp
    name: turmeric
    raw: ¼ tsp ground turmeric
  - qty: 1.5
    unit: tbsp
    name: chilli powder
    raw: 1-2 tbsp chilli powder, to taste
  - qty: 2
    unit: tbsp
    name: mixed powder
    raw: 2 tbsp Mixed Powder
  - qty: 500
    unit: ml
    name: curry base gravy
    raw: 500 ml Curry Base Gravy
  - qty: 750
    unit: g
    name: pre cooked lamb
    raw: 750 g Pre-cooked Lamb
  - qty: 200
    unit: ml
    name: lamb stock
    raw: 200 ml Lamb stock
  - qty: 1.5
    unit: tbsp
    name: smooth mango chutney
    raw: 1-2 tbsp smooth mango chutney, to taste
  - qty: 1
    name: lime
    raw: 1 lime
  - name: salt
    raw: Salt, to taste
  - qty: 1
    unit: pinch
    name: garam masala
    raw: Pinch of Garam Masala
  - name: coriander
    raw: Coriander , to garnish
