prep: 5 minutes (longer if pre-cooking the potatoes)
cook: 12 minutes
allergens:
  - dairy
  - meat
  - mustard
  - garlic
tags:
  - gluten-free
  - spicy
  - quick
  - make-ahead
  - meals
  - asian
  - meat
  - lamb
  - onion
  - garlic
  - tomato
  - ginger
  - potato
  - lime
  - coriander
  - yogurt
  - chili
  - complex
mentions:
  - cuisine/indian/Base/pre-cooked-lamb
  - tutorials/cocktails/garnish
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/pizza/sauce
ingredients:
  - qty: 3
    name: oil
    raw: 3 to 4 tbsp oil
  - qty: 1
    unit: tsp
    name: mustard seeds
    raw: 1 tsp mustard seeds
  - qty: 0.25
    unit: tsp
    name: fenugreek seeds
    raw: 0.25 tsp fenugreek seeds
  - qty: 0.5
    unit: tsp
    name: cumin seeds (black)
    raw: 0.5 tsp black cumin seeds
  - qty: 0.5
    unit: tsp
    name: kalonji seeds
    raw: 0.5 tsp kalonji seeds
  - name: alternatively
    raw: "alternatively: 2.5 tsp Panch Poran in place of the four seed measures above"
  - qty: 75
    name: onions
    raw: 75 to 100 g onion, sliced into thin semi-circular rings
  - qty: 1.5
    unit: tsp
    name: ginger garlic paste
    raw: 1.5 tsp ginger-garlic paste
  - qty: 1
    unit: tsp
    name: kasuri methi
    raw: 1 tsp kasuri methi
  - qty: 1.5
    unit: tsp
    name: kashmiri chilli powder
    raw: 1.5 tsp Kashmiri chilli powder
  - qty: 1.5
    unit: tsp
    name: mix powder
    raw: 1.5 tsp Mix Powder
  - qty: 0.25
    unit: tsp
    name: salt
    raw: 0.25 tsp salt
  - qty: 5
    unit: tbsp
    name: tomato paste
    raw: 5 tbsp tomato paste
  - qty: 1
    unit: tbsp
    name: coriander stalks
    raw: 1 tbsp finely chopped fresh coriander stalks
  - qty: 200
    unit: g
    name: pre cooked lamb
    raw: 200 g Pre-Cooked Lamb
  - qty: 330
    name: ml+ curry base gravy
    raw: 330 ml+ Curry Base Gravy, heated through
  - qty: 75
    unit: g
    name: pre cooked potato chunks
    raw: 75 g pre-cooked potato chunks, 5 to 6 pieces
  - qty: 1
    name: indian pickle of choice
    raw: 1 to 1.5 tbsp Indian pickle of choice
  - qty: 3
    name: tomato segments
    raw: 3 to 4 fresh tomato segments
  - qty: 3
    unit: tbsp
    name: natural yoghurt
    raw: 3 tbsp natural yoghurt
  - qty: 1
    unit: tbsp
    name: coriander
    raw: 1 tbsp finely chopped fresh coriander leaves, to garnish
  - qty: 1
    name: tomato segment
    raw: 1 extra tomato segment, to garnish
