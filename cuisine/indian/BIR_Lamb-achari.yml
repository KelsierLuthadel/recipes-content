ingredients:
  - qty: 4
    unit: tbsp
    name: rapeseed oil or vegetable oil
    raw: 4 tbsp rapeseed oil or vegetable oil
  - qty: 1
    unit: tbsp
    name: panch poran
    raw: 1 tbsp Panch Poran
  - qty: 2
    name: kashmiri dried red chillies
    raw: 2 Kashmiri dried red chillies, split lengthways and deseeded
  - qty: 1
    name: onion
    raw: 1 onion, thinly sliced into rings
  - qty: 2
    unit: tbsp
    name: garlic and ginger paste
    raw: 2 tbsp garlic and ginger paste
  - qty: 2
    name: bird’s eye chillies
    raw: 2 bird’s eye chillies, finely chopped
  - qty: 125
    unit: ml
    name: tomato puree
    raw: 125 ml tomato purée, plain passata, or blended canned tomatoes
  - qty: 2
    unit: tbsp
    name: mixed powder
    raw: 2 tbsp Mixed Powder
  - qty: 1
    unit: tsp
    name: coriander
    raw: 1 tsp ground coriander
  - qty: 1
    unit: tsp
    name: kashmiri chilli powder
    raw: 1 tsp Kashmiri chilli powder
  - qty: 600
    unit: ml
    name: curry base gravy
    raw: 600 ml Curry Base Gravy
  - qty: 750
    unit: g
    name: pre-cooked lamb
    raw: 750 g Pre-cooked Lamb
  - qty: 200
    unit: ml
    name: lamb stock
    raw: 200 ml Lamb stock
  - qty: 2
    unit: tbsp
    name: lime pickle
    raw: 2 tbsp lime pickle, or 1 tbsp each lime pickle and smooth mango chutney
  - qty: 4
    unit: tbsp
    name: plain yoghurt
    raw: 4 tbsp plain yoghurt
  - qty: 1
    unit: tsp
    name: fenugreek leaves
    raw: 1 tsp dried fenugreek leaves
  - qty: 1
    unit: tsp
    name: garam masala
    raw: 1 tsp Garam Masala
  - name: salt
    raw: Salt, to taste
  - qty: 1
    name: lemon
    raw: 1 lemon
  - qty: 3
    unit: tbsp
    name: coriander leaves
    raw: 3 tbsp finely chopped coriander leaves, to garnish
