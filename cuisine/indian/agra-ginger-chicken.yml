ingredients:
  - qty: 80
    unit: ml
    name: vegetable oil
    raw: 80 ml vegetable oil
  - qty: 2
    name: white onions
    raw: 2 white onions , halved and thinly sliced
  - qty: 5
    name: ginger
    raw: 5 cm fresh root ginger, peeled and grated
  - qty: 6
    name: garlic cloves
    raw: 6 garlic cloves, minced
  - qty: 4
    name: green cardamom pods
    raw: 4 green cardamom pods
  - qty: 2
    name: cinnamon sticks
    raw: 2 cinnamon sticks
  - qty: 3
    unit: tbsp
    name: garam masala
    raw: 3 tbsp Garam Masala
  - qty: 0.5
    unit: tsp
    name: turmeric
    raw: ½ tsp ground turmeric
  - qty: 0.25
    unit: tsp
    name: chilli powder
    raw: ¼ tsp chilli powder
  - qty: 750
    unit: g
    name: chicken thighs
    raw: 750 g bone-in chicken thighs, quartered
  - qty: 400
    unit: g
    name: tomatoes
    raw: 400 g canned chopped tomatoes
  - qty: 450
    unit: ml
    name: water
    raw: 450 ml water
  - qty: 1
    unit: tsp
    name: salt
    raw: 1 tsp salt
  - qty: 1
    unit: tsp
    name: sugar
    raw: 1 tsp sugar
  - qty: 200
    unit: g
    name: spinach
    raw: 200 g baby spinach, washed
  - qty: 1
    name: lime
    raw: 1 lime
  - qty: 1
    name: coriander
    raw: 1 small bunch fresh coriander, leaves and stalks roughly chopped
