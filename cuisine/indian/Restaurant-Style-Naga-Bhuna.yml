ingredients:
  - qty: 3
    name: oil
    raw: 3 to 4 tbsp oil, ghee, or a mix
  - qty: 1
    name: tej patta
    raw: 1 tej patta , or 1 regular bay leaf
  - qty: 2
    name: cardamom pods (green)
    raw: 2 green cardamom pods, split
  - qty: 0.5
    unit: tsp
    name: cumin seeds
    raw: 0.5 tsp cumin seeds
  - qty: 75
    unit: g
    name: onions
    raw: 75 g onion, very finely chopped
  - qty: 25
    unit: g
    name: pepper (green)
    raw: 25 g green pepper, very finely chopped
  - qty: 1
    name: garlic
    raw: 1 to 2 garlic cloves, thinly sliced
  - qty: 1.5
    name: ginger garlic paste
    raw: 1.5 to 2 tsp ginger-garlic paste
  - qty: 1.25
    unit: tsp
    name: mix powder
    raw: 1.25 tsp Mix Powder
  - qty: 1
    unit: tsp
    name: extra hot chilli powder
    raw: 1 tsp extra-hot chilli powder, or Deggi Mirch
  - qty: 1
    unit: tsp
    name: kashmiri chilli powder
    raw: 1 tsp Kashmiri chilli powder
  - qty: 1
    unit: tsp
    name: tandoori masala
    raw: 1 tsp Tandoori Masala
  - qty: 1
    unit: tsp
    name: kasuri methi
    raw: 1 tsp kasuri methi
  - qty: 0.25
    name: salt
    raw: 0.25 to 0.5 tsp salt
  - qty: 4
    unit: tbsp
    name: tomato paste
    raw: 4 tbsp tomato paste
  - qty: 1
    unit: pinch
    name: food colour powder (red)
    raw: a pinch of red food colour powder
  - qty: 1
    unit: tbsp
    name: coriander stalks
    raw: 1 tbsp finely chopped fresh coriander stalks
  - qty: 1
    name: naga chillies
    raw: 1 to 2 fresh naga chillies, very finely chopped, or 1 tbsp naga pickle
  - qty: 175
    name: pre cooked chicken
    raw: 175 to 200 g Pre-Cooked Chicken, Pre-Cooked Lamb, chicken tikka, or vegetables
  - qty: 250
    name: ml+ curry base gravy
    raw: 250 ml+ Curry Base Gravy, heated through
  - qty: 2
    name: tomato segments
    raw: 2 to 3 fresh tomato segments
  - qty: 2
    name: natural yoghurt
    raw: 2 to 3 tsp natural yoghurt
  - qty: 1.5
    unit: tsp
    name: mango chutney
    raw: 1.5 tsp mango chutney
  - qty: 1
    unit: tbsp
    name: coriander
    raw: 1 tbsp finely chopped fresh coriander leaves
  - qty: 1
    name: tomato
    raw: 1 slice tomato or cucumber, to garnish
