ingredients:
  - qty: 1
    name: sriracha
    raw: 1 to 2 tbsp sriracha
  - qty: 4
    unit: tbsp
    name: tomato paste
    raw: 4 tbsp tomato paste
  - qty: 1
    unit: tsp
    name: chilli pickle
    raw: 1 tsp chilli pickle or lime pickle
  - qty: 1
    unit: tsp
    name: mango chutney
    raw: 1 tsp mango chutney
  - qty: 1
    unit: tsp
    name: lemon
    raw: 1 tsp lemon or lime juice, or vinegar
  - qty: 1
    unit: tiny pinch
    name: red
    raw: a tiny pinch of red or orange food colour powder
  - qty: 4
    unit: tbsp
    name: oil
    raw: 4 tbsp oil
  - qty: 1
    unit: tsp
    name: cumin seeds
    raw: 1 tsp cumin seeds
  - qty: 75
    unit: g
    name: onion
    raw: 75 g onion, finely chopped
  - qty: 2
    unit: tsp
    name: ginger garlic paste
    raw: 2 tsp ginger-garlic paste
  - qty: 2
    unit: tsp
    name: mix powder
    raw: 2 tsp Mix Powder
  - qty: 1
    unit: tsp
    name: kasuri methi
    raw: 1 tsp kasuri methi
  - qty: 2
    unit: tsp
    name: chilli powder
    raw: 2 tsp chilli powder
  - qty: 0.5
    unit: tsp
    name: tandoori masala
    raw: 0.5 tsp Tandoori Masala
  - qty: 2
    name: chillies (green)
    raw: 2 to 3 green chillies, finely chopped
  - qty: 175
    name: chicken
    raw: 175 to 200 g chicken, raw, or Pre-Cooked Chicken
  - qty: 1
    unit: tbsp
    name: coriander stalks
    raw: 1 tbsp finely chopped fresh coriander stalks
  - qty: 330
    name: ml+ curry base gravy
    raw: 330 ml+ Curry Base Gravy, heated through
  - qty: 2
    name: tomato segments
    raw: 2 fresh tomato segments
  - qty: 1
    unit: tbsp
    name: coriander
    raw: 1 tbsp finely chopped fresh coriander leaves
  - qty: 3
    name: single cream
    raw: 3 to 4 tbsp single cream
  - name: salt
    raw: salt, to taste
  - name: red
    raw: extra chopped fresh red or green chillies, to garnish
