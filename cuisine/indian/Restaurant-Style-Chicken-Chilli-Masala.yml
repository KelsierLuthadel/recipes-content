prep: 5 minutes
cook: 12 minutes
allergens:
  - dairy
  - meat
  - garlic
tags:
  - gluten-free
  - spicy
  - quick
  - make-ahead
  - meals
  - asian
  - meat
  - chicken
  - onion
  - garlic
  - tomato
  - ginger
  - lemon
  - lime
  - coriander
  - cream
  - chili
  - complex
mentions:
  - tutorials/chocolate/tempering
  - tutorials/cocktails/garnish
