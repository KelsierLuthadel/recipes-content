    unit: ml
    name: tomato puree
    raw: 125 ml tomato purée
  - qty: 500
    unit: ml
    name: curry base gravy
    raw: 500 ml Curry Base Gravy
  - qty: 800
    unit: g
    name: pre cooked chicken
    raw: 800 g Pre-Cooked Chicken
  - qty: 125
    unit: ml
    name: chicken stock
    raw: 125 ml Chicken Stock
  - qty: 1
    unit: tbsp
    name: smooth mango chutney
    raw: 1 tbsp smooth mango chutney, or to taste
  - qty: 0.5
    unit: tsp
    name: tamarind concentrate
    raw: ½ tsp tamarind concentrate
