ingredients:
  - qty: 4
    unit: tbsp
    name: rapeseed oil or seasoned oil
    raw: 4 tbsp rapeseed oil or seasoned oil
  - qty: 2
    unit: tbsp
    name: garlic and ginger paste
    raw: 2 tbsp garlic and ginger paste
  - qty: 2
    unit: tbsp
    name: paprika
    raw: 2 tbsp paprika
