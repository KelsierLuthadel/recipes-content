    unit: tsp
    name: fenugreek leaves
    raw: 1 tsp dried fenugreek leaves
  - qty: 1
    unit: tsp
    name: garam masala
    raw: 1 tsp Garam Masala
  - qty: 125
    unit: ml
    name: tomato puree
    raw: 125 ml tomato purée
  - qty: 500
    unit: ml
    name: curry base gravy
    raw: 500 ml Curry Base Gravy
  - qty: 750
    unit: g
    name: pre-cooked lamb
    raw: 750 g Pre-cooked Lamb
  - qty: 200
    unit: ml
    name: lamb stock
    raw: 200 ml Lamb stock
  - qty: 2
    name: tomatoes
    raw: 2 tomatoes, quartered
  - qty: 2.5
    unit: tbsp
    name: cashew paste
    raw: 2-3 tbsp raw cashew paste
  - qty: 3
    unit: tbsp
    name: plain yoghurt
    raw: 3 tbsp plain yoghurt, plus extra to garnish
  - name: salt
    raw: Salt, to taste
  - qty: 3
    unit: tbsp
    name: coriander leaves
    raw: 3 tbsp chopped coriander leaves
