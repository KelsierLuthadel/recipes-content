prep: 20 minutes
cook: None (plus 2 weeks marinating)
allergens:
  - dairy
  - garlic
tags:
  - vegetarian
  - gluten-free
  - spicy
  - quick
  - snack
  - onion
  - garlic
  - cheese
  - chili
mentions:
  - tutorials/cocktails/equipment
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/spices/storage
ingredients:
  - qty: 2
    name: rounds hermelin cheese
    raw: 2 whole rounds Hermelín cheese
  - qty: 2
    name: onions
    raw: 2 medium onions, very thinly sliced into rings
  - qty: 1
    name: red bell pepper
    raw: 1 small red bell pepper, very thinly sliced
  - qty: 6
    unit: clove
    name: garlic
    raw: 6 cloves garlic, thinly sliced
  - qty: 1
    name: red chilli
    raw: 1 fresh red chilli, thinly sliced
  - qty: 2
    unit: tbsp
    name: sweet hungarian paprika
    raw: 2 tbsp sweet Hungarian paprika
  - qty: 1
    unit: tsp
    name: hot paprika
    raw: 1 tsp hot paprika
  - qty: 2
    unit: tsp
    name: black peppercorns
    raw: 2 tsp whole black peppercorns
  - qty: 4
    name: allspice berries
    raw: 4 whole allspice berries
  - qty: 4
    name: bay leaves
    raw: 4 bay leaves
  - qty: 2
    unit: tbsp
    name: white wine vinegar
    raw: 2 tbsp white wine vinegar
  - qty: 700
    unit: ml
    name: olive oil enough to fully submerge
    raw: 600-800 ml mild olive oil - enough to fully submerge
