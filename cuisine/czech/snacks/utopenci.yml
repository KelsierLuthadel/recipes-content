  - meat
  - mustard
  - garlic
tags:
  - dairy-free
  - gluten-free
  - spicy
  - quick
  - snack
  - meat
  - pork
  - onion
  - garlic
  - chili
mentions:
  - tutorials/charcuterie/sausages
