prep: 10 minutes
cook: 1 hour (kaya); 4 minutes (toast)
allergens:
  - gluten
  - dairy
  - eggs
tags:
  - vegetarian
  - dessert
  - eggs
  - coconut
  - butter
mentions:
  - tutorials/spices/storage
ingredients:
  - qty: 6
    name: egg yolks
    raw: 6 large egg yolks
  - qty: 200
    unit: g
    name: caster sugar
    raw: 200 g caster sugar
  - qty: 250
    unit: ml
    name: coconut cream
    raw: 250 ml thick coconut cream
  - qty: 5
    name: pandan leaves
    raw: 5 pandan leaves, knotted in a bundle
  - qty: 0.25
    name: /4 tsp salt
    raw: 1/4 tsp salt
  - qty: 2
    name: white bread
    raw: 2 thick slices white bread
  - qty: 30
    unit: g
    name: cold unsalted butter
    raw: 30 g cold unsalted butter, sliced thick
  - qty: 2
    unit: tbsp
    name: kaya
    raw: 2 tbsp kaya
  - qty: 2
    name: soft boiled eggs
    raw: 2 soft-boiled eggs to serve
  - name: kopi
    raw: A small cup of kopi or strong tea
