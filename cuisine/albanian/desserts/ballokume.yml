prep: 25 minutes (plus overnight rest of butter mixture)
cook: 18 minutes per tray
allergens:
  - gluten
  - dairy
  - eggs
tags:
  - vegetarian
  - dessert
  - make-ahead
  - one-pan
  - eggs
  - butter
mentions:
  - tutorials/pizza/dough
  - tutorials/spices/storage
ingredients:
  - qty: 300
    unit: g
    name: unsalted butter
    raw: 300 g unsalted butter
  - qty: 1.5
    unit: tsp
    name: sea salt
    raw: 1 1/2 teaspoons fine sea salt
  - qty: 350
    unit: g
    name: caster sugar
    raw: 350 g caster sugar
  - qty: 4
    name: egg yolks
    raw: 4 egg yolks
  - qty: 400
    unit: g
    name: yellow cornmeal
    raw: 400 g fine yellow cornmeal
  - qty: 100
    unit: g
    name: plain flour
    raw: 100 g plain flour
  - qty: 0.5
    name: /2 teaspoon baking powder
    raw: 1/2 teaspoon baking powder
  - name: bowl of icing sugar
    raw: A small bowl of icing sugar
  - name: glass of cold milk or a small cup of albanian coffee
    raw: A glass of cold milk OR a small cup of Albanian coffee
