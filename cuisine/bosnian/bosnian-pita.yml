  - qty: 500
    unit: g
    name: beef
    raw: 500 g lean minced beef
  - qty: 2
    name: onions
    raw: 2 large onions, peeled and grated on the coarse side of a box grater
  - qty: 1
    unit: tsp
    name: sea salt
    raw: 1 teaspoon fine sea salt
  - qty: 1
    unit: tsp
    name: black pepper
    raw: 1 teaspoon freshly ground black pepper
  - qty: 1
    unit: tsp
    name: sweet paprika
    raw: 1 teaspoon sweet paprika
  - qty: 100
    unit: ml
    name: sparkling water
    raw: 100 ml sparkling water
  - qty: 50
    unit: g
    name: lamb tail fat
    raw: 50 g lamb tail fat or beef suet, very finely chopped
  - qty: 100
    unit: ml
    name: sunflower oil
    raw: 100 ml sunflower oil, for brushing the dough
