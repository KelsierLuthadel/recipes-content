  - qty: 150
    unit: ml
    name: sunflower oil
    raw: 150 ml sunflower oil
  - qty: 8
    name: garlic
    raw: 8 garlic cloves, finely chopped
  - qty: 2
    unit: tbsp
    name: sea salt
    raw: 2 tablespoons fine sea salt
  - qty: 1
    unit: tbsp
    name: caster sugar
    raw: 1 tablespoon caster sugar
  - qty: 3
    unit: tbsp
    name: wine vinegar (white)
    raw: 3 tablespoons white wine vinegar
  - qty: 1
    unit: tsp
    name: pepper (black)
    raw: 1 teaspoon freshly ground black pepper
