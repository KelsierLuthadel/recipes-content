ingredients:
  - qty: 800
    unit: g
    name: brussels sprouts
    raw: 800 g fresh Brussels sprouts, trimmed and halved
  - qty: 200
    unit: g
    name: thick-cut smoked streaky bacon
    raw: 200 g good thick-cut smoked streaky bacon, cut into 1 cm lardons
  - qty: 1
    unit: tbsp
    name: sunflower oil
    raw: 1 tablespoon sunflower oil
  - qty: 3
    unit: tbsp
    name: pure canadian maple syrup
    raw: 3 tablespoons pure Canadian maple syrup
  - qty: 2
    unit: tbsp
    name: cider vinegar or lemon juice
    raw: 2 tablespoons cider vinegar OR lemon juice
  - qty: 0.5
    name: /2 teaspoon dijon mustard
    raw: 1/2 teaspoon Dijon mustard
  - qty: 0.25
    name: /4 teaspoon black pepper
    raw: 1/4 teaspoon black pepper
  - qty: 1
    unit: pinch
    name: red chilli flakes
    raw: A pinch of red chilli flakes
  - qty: 1
    unit: tsp
    name: flaky sea salt
    raw: 1 teaspoon flaky sea salt
  - qty: 2
    unit: tbsp
    name: toasted pecans
    raw: 2 tablespoons toasted pecans, roughly chopped
  - name: thyme leaves
    raw: A few sprigs of fresh thyme leaves
  - name: cedar-plank salmon
    raw: Cedar-plank salmon, roast turkey, baked ham, or a Sunday roast
  - name: glass of cold dry riesling or a canadian pinot noir
    raw: A glass of cold dry Riesling or a Canadian Pinot Noir
