  - tree-nuts
  - meat
tags:
  - snack
  - make-ahead
  - meat
  - beef
  - eggs
  - lemon
  - butter
  - chocolate
  - nuts
  - complex
mentions:
  - cuisine/jamaican/snacks/festival
