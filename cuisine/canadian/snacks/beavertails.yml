ingredients:
  - qty: 400
    unit: g
    name: bread flour (white)
    raw: 400 g strong white bread flour
  - qty: 60
    unit: g
    name: caster sugar
    raw: 60 g caster sugar
  - qty: 1
    unit: tsp
    name: salt
    raw: 1 teaspoon salt
  - qty: 7
    unit: g
    name: instant dry yeast
    raw: 7 g instant dry yeast
  - qty: 1
    name: eggs
    raw: 1 large egg
  - qty: 200
    unit: ml
    name: milk
    raw: 200 ml whole milk, lukewarm
  - qty: 60
    unit: g
    name: butter (unsalted)
    raw: 60 g unsalted butter, melted and cooled
  - qty: 1
    unit: tsp
    name: vanilla extract
    raw: 1 teaspoon vanilla extract
  - qty: 2
    unit: l
    name: sunflower oil
    raw: 2 litres sunflower oil OR rapeseed oil
  - qty: 150
    unit: g
    name: caster sugar
    raw: 150 g caster sugar
  - qty: 3
    unit: tbsp
    name: cinnamon
    raw: 3 tablespoons ground cinnamon
  - qty: 1
    unit: small pinch
    name: sea salt
    raw: A small pinch of fine sea salt
  - name: the same cinnamon sugar as above
    raw: The same cinnamon-sugar as above
  - qty: 2
    unit: tbsp
    name: lemon juice
    raw: 2 tablespoons fresh lemon juice
  - qty: 60
    unit: g
    name: butter (unsalted)
    raw: 60 g unsalted butter, soft
  - qty: 60
    unit: ml
    name: pure maple syrup
    raw: 60 ml pure maple syrup
  - name: whisk together
    raw: Whisk together; spread on the hot BeaverTail
  - qty: 4
    unit: tbsp
    name: nutella
    raw: 4 tablespoons Nutella OR chocolate-hazelnut spread, warmed slightly
