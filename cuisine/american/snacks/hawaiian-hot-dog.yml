prep: 15 minutes
cook: 10 minutes
allergens:
  - gluten
  - meat
  - mustard
tags:
  - dairy-free
  - spicy
  - quick
  - snack
  - hot-dog
  - meat
  - beef
  - pork
  - onion
  - ginger
