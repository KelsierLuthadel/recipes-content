ingredients:
  - qty: 4
    name: king's hawaiian sweet bread rolls
    raw: 4 large King's Hawaiian sweet bread rolls
  - qty: 4
    name: portuguese style sweet sausages
    raw: 4 Portuguese-style sweet sausages OR 4 all-beef frankfurters
  - qty: 1
    unit: tbsp
    name: vegetable oil
    raw: 1 tablespoon vegetable oil
  - qty: 1
    name: mango
    raw: 1 ripe mango ; or 200 g frozen mango chunks
  - qty: 200
    unit: g
    name: pineapple
    raw: 200 g fresh pineapple ; or use canned crushed pineapple
  - qty: 2
    unit: tbsp
    name: sugar (brown)
    raw: 2 tablespoons brown sugar
  - name: lime
    raw: Juice of 1 lime
  - qty: 1
    unit: tbsp
    name: rice vinegar
    raw: 1 tablespoon rice vinegar
  - qty: 1
    name: ginger
    raw: 1 thumb fresh ginger
  - qty: 1
    name: chilli (red)
    raw: 1 small fresh red chilli
  - qty: 0.5
    unit: tsp
    name: sea salt
    raw: ½ teaspoon fine sea salt
  - qty: 1
    name: maui sweet onion
    raw: 1 Maui sweet onion ; or substitute Vidalia onion or any sweet onion
  - name: mustard (yellow)
    raw: Yellow mustard
  - name: coriander
    raw: Fresh coriander or chopped scallion
  - name: optional
    raw: "Optional: sliced fresh jalapeño or pickled jalapeño rings"
  - name: cold kona big wave
    raw: A cold Kona Big Wave or Maui Brewing beer
  - name: hawaiian style poi
    raw: Hawaiian-style poi or taro chips on the side
  - name: tropical fruit on the plate
    raw: Tropical fruit on the plate
