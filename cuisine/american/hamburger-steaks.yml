prep: 15 minutes (plus 1 hour resting)
cook: 25 minutes
allergens:
  - gluten
  - meat
  - garlic
tags:
  - dairy-free
  - make-ahead
  - meals
  - meat
  - beef
  - onion
  - garlic
  - coriander
  - honey
  - complex
mentions:
  - tutorials/cocktails/garnish
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/pizza/sauce
  - tutorials/spices/storage
  - base-ingredients/spices/cajun-spice-mix
ingredients:
  - qty: 900
    unit: g
    name: beef
    raw: 900 g ground beef
  - qty: 0.25
    unit: cup
    name: scallions
    raw: ¼ cup chopped scallions
  - qty: 1
    unit: tbsp
    name: cajun seasoning
    raw: 1 tablespoon Cajun seasoning
  - qty: 0.5
    unit: tsp
    name: cumin
    raw: ½ teaspoon ground cumin
  - qty: 0.5
    unit: tsp
    name: coriander
    raw: ½ teaspoon ground coriander
  - qty: 0.5
    unit: tsp
    name: paprika
    raw: ½ teaspoon paprika
  - qty: 0.5
    unit: tsp
    name: garlic granules
    raw: ½ teaspoon garlic granules
  - qty: 0.25
    unit: tsp
    name: oregano
    raw: ¼ teaspoon dried oregano
  - qty: 1
    unit: tbsp
    name: garlic paste
    raw: 1 tablespoon garlic paste
  - qty: 1
    unit: tbsp
    name: worcestershire sauce
    raw: 1 tablespoon Worcestershire sauce
  - qty: 1
    unit: tbsp
    name: maple syrup
    raw: 1 tablespoon maple syrup
  - qty: 1
    unit: tsp
    name: onions
    raw: 1 teaspoon dried minced onion
  - qty: 2
    unit: tbsp
    name: olive oil
    raw: 2 tablespoons olive oil
  - qty: 1
    name: onion (yellow)
    raw: 1 yellow onion
  - qty: 1
    name: beef stock cube
    raw: 1 beef stock cube, crumbled
  - qty: 2
    unit: tsp
    name: onion flakes
    raw: 2 teaspoons dried onion flakes
  - qty: 1
    unit: tsp
    name: onion granules
    raw: 1 teaspoon onion granules
  - qty: 1
    unit: tsp
    name: cornflour
    raw: 1 teaspoon cornflour
  - qty: 1
    unit: pinch
    name: caster sugar
    raw: pinch of caster sugar
  - qty: 2
    unit: tbsp
    name: plain flour
    raw: 2 tablespoons plain flour
  - qty: 480
    unit: ml
    name: beef stock
    raw: 480 ml beef stock
