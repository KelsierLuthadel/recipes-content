prep: 15 minutes
cook: 10 minutes
allergens:
  - peanuts
  - garlic
tags:
  - vegetarian
  - vegan
  - dairy-free
  - gluten-free
  - quick
  - snack
  - onion
  - garlic
  - ginger
  - nuts
  - chili
mentions:
  - cuisine/ghanaian/side-dishes/fried-plantain
  - cuisine/saint-lucian/side-dishes/fried-plantain
