prep: 15 minutes (plus overnight bean soak)
cook: 1 hour
allergens:
  - eggs
tags:
  - vegetarian
  - dairy-free
  - gluten-free
  - make-ahead
  - meals
  - eggs
  - rice
  - tomato
mentions:
  - cuisine/ghanaian/side-dishes/fried-plantain
  - cuisine/ghanaian/side-dishes/shito
  - cuisine/saint-lucian/side-dishes/fried-plantain
  - tutorials/pizza/sauce
