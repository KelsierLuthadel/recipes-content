    unit: tbsp
    name: rose water
    raw: 1 tbsp rose water
  - qty: 1
    unit: tsp
    name: orange blossom water
    raw: 1 tsp orange blossom water
  - qty: 3
    unit: tbsp
    name: pistachios
    raw: 3 tbsp pistachios, finely chopped
  - qty: 1
    unit: tbsp
    name: rose petals
    raw: 1 tbsp dried rose petals
  - qty: 1
    unit: tbsp
    name: honey
    raw: 1 tbsp honey or sugar syrup
