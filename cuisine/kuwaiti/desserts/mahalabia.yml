allergens:
  - dairy
  - tree-nuts
tags:
  - vegetarian
  - gluten-free
  - dessert
  - make-ahead
  - cream
  - honey
  - nuts
  - complex
mentions:
  - tutorials/spices/storage
ingredients:
  - qty: 800
    unit: ml
    name: milk
