    name: dill
    raw: 1 small bunch fresh dill, finely chopped
  - qty: 3
    unit: tbsp
    name: sunflower oil
    raw: 3 tbsp sunflower oil
  - qty: 1
    unit: tbsp
    name: wine vinegar (red)
    raw: 1 tbsp red wine vinegar
  - qty: 300
    unit: ml
    name: water
    raw: 300 ml very cold water
  - qty: 1
    unit: tsp
    name: sea salt
    raw: 1 tsp fine sea salt
  - name: pepper (black)
    raw: Black pepper to taste
