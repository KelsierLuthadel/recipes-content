prep: 25 minutes (plus overnight marinating)
cook: 12 minutes on the grill
allergens:
  - dairy
  - soy
  - fish
tags:
  - gluten-free
  - spicy
  - make-ahead
  - sides
  - asian
  - bbq
  - fish
  - rice
  - coconut
  - lime
  - chili
  - soy-sauce
  - curry
mentions:
  - base-ingredients/curry-paste/thai-green-paste-traditional
  - tutorials/pizza/sauce
  - tutorials/spices/storage
  - tutorials/thai-curry/green
ingredients:
  - qty: 2
    name: asian purple aubergines
    raw: 2 long Asian purple aubergines , cut into 3 cm thick wedges, or 1 large European aubergine cut into 2 ½ cm slabs
  - qty: 1
    unit: tsp
    name: salt
    raw: 1 tsp fine salt
  - qty: 200
    unit: ml
    name: coconut cream
    raw: 200 ml full-fat coconut cream
  - qty: 3
    name: thai green curry paste
    raw: 3 to 4 tbsp Thai green curry paste
  - qty: 1
    unit: tbsp
    name: coconut oil
    raw: 1 tbsp coconut oil
  - qty: 2
    unit: tbsp
    name: fish sauce
    raw: 2 tbsp fish sauce
  - qty: 1
    unit: tbsp
    name: palm sugar
    raw: 1 tbsp palm sugar, shaved, or soft light brown sugar
  - qty: 4
    name: makrut lime leaves
    raw: 4 makrut lime leaves, central stems removed, torn
  - qty: 1
    unit: tbsp
    name: lime juice
    raw: 1 tbsp lime juice
  - qty: 1
    unit: small handful
    name: thai basil
    raw: 1 small handful Thai basil leaves , roughly torn
  - name: thai basil
    raw: Extra Thai basil leaves
  - qty: 1
    name: chilli (red)
    raw: 1 long red chilli, sliced on the diagonal
  - name: lime wedges
    raw: Lime wedges
  - name: sticky rice
    raw: Sticky rice
