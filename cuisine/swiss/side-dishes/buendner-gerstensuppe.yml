  - qty: 1
    name: onions
    raw: 1 large onion, finely diced
  - qty: 2
    name: carrots
    raw: 2 medium carrots, diced
  - qty: 2
    name: celery
    raw: 2 celery sticks, diced
  - qty: 1
    name: leeks
    raw: 1 small leek, sliced
  - qty: 1
    name: turnips
    raw: 1 small turnip or 200 g celeriac, diced
  - qty: 2
    unit: clove
