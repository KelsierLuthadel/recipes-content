    raw: 2 cloves garlic, minced
  - qty: 2
    name: bay leaves
    raw: 2 bay leaves
  - qty: 1
    unit: tsp
    name: thyme
    raw: 1 tsp dried thyme
  - qty: 1.8
    unit: l
    name: beef
    raw: 1.8 L beef or chicken stock
  - qty: 100
    unit: g
    name: bundnerfleisch
    raw: 100 g bündnerfleisch , finely sliced
  - qty: 150
    unit: ml
    name: double cream
    raw: 150 ml double cream
