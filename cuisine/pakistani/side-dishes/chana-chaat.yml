mentions:
  - tutorials/pizza/sauce
  - tutorials/spices/storage
  - base-ingredients/spices/chaat-masala
ingredients:
  - qty: 2
    name: chickpeas
    raw: 2 tins chickpeas
  - qty: 1
    name: onion (red)
    raw: 1 red onion
  - qty: 2
    name: tomatoes
    raw: 2 tomatoes
  - qty: 1
    name: potato
    raw: 1 potato
  - qty: 1
    name: chilli (green)
    raw: 1 green chilli
  - qty: 4
    unit: tbsp
    name: coriander
    raw: 4 tablespoons fresh coriander
  - qty: 2
    unit: tbsp
    name: mint
    raw: 2 tablespoons fresh mint
  - qty: 2
    name: lemons
    raw: 2 lemons
  - qty: 1.5
    unit: tsp
    name: chaat masala
    raw: 1 ½ teaspoons Chaat Masala
  - qty: 1
    unit: tsp
    name: cumin
    raw: 1 teaspoon ground roasted cumin
  - qty: 0.5
    unit: tsp
    name: kashmiri red chilli powder
    raw: ½ teaspoon Kashmiri red chilli powder
  - qty: 0.5
    unit: tsp
    name: salt (black)
    raw: ½ teaspoon black salt
  - qty: 0.5
    unit: tsp
    name: salt
    raw: ½ teaspoon salt
  - qty: 1
    unit: tbsp
    name: tamarind chutney
    raw: 1 tablespoon Tamarind Chutney
  - qty: 1
    unit: tsp
    name: hot green chilli sauce
    raw: 1 teaspoon hot green chilli sauce
  - qty: 30
    unit: g
    name: papri
    raw: 30 g papri
  - qty: 2
    unit: tbsp
    name: sev
    raw: 2 tablespoons sev
  - name: coriander
    raw: Extra fresh coriander
  - qty: 1
    name: lemons
