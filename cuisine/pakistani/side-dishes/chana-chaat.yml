prep: 15 minutes
cook: 5 minutes (assuming pre-cooked chickpeas)
allergens:
  - gluten
tags:
  - vegetarian
  - vegan
  - dairy-free
  - spicy
  - quick
  - make-ahead
  - sides
  - onion
  - tomato
  - potato
  - lemon
