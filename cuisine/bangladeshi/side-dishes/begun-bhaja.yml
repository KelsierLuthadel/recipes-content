    raw: 2 tsp turmeric powder
  - qty: 1
    unit: tsp
    name: chilli powder
    raw: 1 tsp chilli powder
  - qty: 1
    unit: tsp
    name: cumin
    raw: 1 tsp ground cumin
  - qty: 1
    unit: tsp
    name: caster sugar
    raw: 1 tsp caster sugar
  - qty: 0.5
    unit: tsp
    name: salt
    raw: ½ tsp fine salt, for the dusting
  - qty: 100
    unit: ml
    name: mustard oil
    raw: 100 ml mustard oil
