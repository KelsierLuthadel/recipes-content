    name: green chillies
    raw: 2 green chillies, very finely chopped
  - qty: 3
    unit: tbsp
    name: mustard oil
    raw: 3 tbsp raw mustard oil
  - qty: 1
    unit: tsp
    name: salt
    raw: 1 tsp fine salt, plus more to taste
  - qty: 1
    unit: small handful
    name: coriander
    raw: A small handful of fresh coriander, chopped
  - qty: 1
    unit: tbsp
    name: lime juice
    raw: 1 tbsp fresh lime juice
  - qty: 1
    name: garlic
    raw: 1 garlic clove, finely grated
  - qty: 1
    unit: tbsp
    name: red chilli flakes
    raw: 1 tbsp dried red chilli flakes, dry-roasted
