prep: 10 minutes (plus 30 minutes resting)
cook: None
allergens:
  - garlic
tags:
  - vegetarian
  - vegan
  - dairy-free
  - gluten-free
  - spicy
  - sides
  - garlic
  - lime
  - coriander
  - chili
mentions:
  - tutorials/spices/storage
ingredients:
  - qty: 3
    name: hard mangoes (green)
    raw: 3 large green hard mangoes
  - qty: 4
    name: limes
    raw: 4 limes, juiced
  - qty: 1
    unit: tsp
    name: sea salt
    raw: 1 tsp sea salt
  - qty: 1
    name: scotch bonnet chillies
    raw: 1 scotch bonnet, very finely chopped
  - qty: 3
    name: garlic
    raw: 3 garlic cloves, very finely grated
  - qty: 1
    name: chadon beni
    raw: 1 large bunch chadon beni or coriander, finely chopped
  - qty: 0.5
    unit: tsp
    name: pepper (black)
    raw: 0.5 tsp black pepper
  - name: optional
    raw: "Optional: 1 tsp brown sugar"
