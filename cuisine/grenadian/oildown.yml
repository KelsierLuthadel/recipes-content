prep: 30 minutes (plus overnight salt-meat soak)
cook: 1 hour 30 minutes
allergens:
  - gluten
  - dairy
  - meat
  - garlic
tags:
  - spicy
  - make-ahead
  - one-pan
  - meals
  - meat
  - beef
  - pork
  - onion
  - garlic
  - coconut
