prep: 10 minutes
cook: 15 minutes
allergens:
  - sesame
tags:
  - vegetarian
  - vegan
  - dairy-free
  - gluten-free
  - quick
  - dessert
  - ginger
  - lime
mentions:
  - tutorials/spices/storage
  - tutorials/sugar-work/caramel
ingredients:
  - qty: 250
    unit: g
    name: sesame seeds
    raw: 250 g sesame seeds
  - qty: 250
    unit: g
    name: soft dark brown sugar
    raw: 250 g soft dark brown sugar
  - qty: 100
    unit: ml
    name: water
    raw: 100 ml water
  - qty: 1
    unit: tbsp
    name: golden syrup or molasses
    raw: 1 tbsp golden syrup or molasses
  - qty: 1
    name: ginger
    raw: 1 thumb fresh ginger, finely grated
  - qty: 0.5
    unit: tsp
    name: fresh-grated nutmeg
    raw: 0.5 tsp fresh-grated nutmeg
  - qty: 1
    unit: pinch
    name: salt
    raw: A pinch of salt
  - qty: 1
    unit: tsp
    name: lime juice
    raw: 1 tsp lime juice
  - qty: 1
    unit: tbsp
    name: vegetable oil
    raw: 1 tbsp vegetable oil
