prep: 30 minutes (plus 1 hour 30 minutes rising + 30 minutes proving)
cook: 20 minutes
allergens:
  - gluten
  - dairy
tags:
  - vegetarian
  - meals
  - complex
mentions:
  - cuisine/bhutanese/shamu-datshi
  - cuisine/tibetan/shapta
  - tutorials/bread/proving
  - tutorials/pizza/dough
  - tutorials/pizza/sauce
ingredients:
  - qty: 500
    unit: g
    name: plain flour
    raw: 500 g plain flour
  - qty: 7
    unit: g
    name: instant dried yeast
    raw: 7 g instant dried yeast
  - qty: 2
    unit: tbsp
    name: caster sugar
    raw: 2 tablespoons caster sugar
  - qty: 1
    unit: tsp
    name: sea salt
    raw: 1 teaspoon fine sea salt
  - qty: 1
    unit: tsp
    name: baking powder
    raw: 1 teaspoon baking powder
  - qty: 220
    unit: ml
    name: milk
    raw: 220 ml warm milk
  - qty: 60
    unit: ml
    name: water
    raw: 60 ml warm water
  - qty: 3
    unit: tbsp
    name: vegetable oil
    raw: 3 tablespoons vegetable oil
