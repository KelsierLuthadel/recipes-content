prep: 15 minutes (plus overnight soaking)
cook: 2 hours
allergens:
  - gluten
  - meat
  - celery
  - garlic
tags:
  - dairy-free
  - make-ahead
  - meals
  - meat
  - pork
  - onion
  - garlic
  - cheese
