  - qty: 1
    name: bay leaf
    raw: 1 bay leaf
  - qty: 2
    unit: sprig
    name: rosemary
    raw: 2 sprigs rosemary
  - qty: 4
    name: garlic
    raw: 4 garlic cloves
  - qty: 50
    unit: g
    name: pork rind
    raw: 50 g pork rind or pancetta in one piece
  - qty: 100
    unit: ml
    name: virgin olive oil
    raw: 100 ml extra virgin olive oil, plus more to finish
  - qty: 1
    name: onion
    raw: 1 small onion, finely chopped
  - qty: 1
    name: celery
    raw: 1 small celery stalk, finely chopped
  - qty: 2
    unit: tbsp
    name: tomato paste
    raw: 2 tbsp tomato paste
  - qty: 1.5
    unit: l
    name: water
    raw: 1.5 litres water or light chicken stock
  - qty: 200
    unit: g
    name: short pasta
    raw: 200 g short pasta
  - name: salt and black pepper
    raw: Salt and black pepper
  - qty: 40
    unit: g
    name: pecorino
    raw: 40 g aged pecorino, finely grated, to serve
