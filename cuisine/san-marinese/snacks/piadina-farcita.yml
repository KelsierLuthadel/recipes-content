  - dairy
  - tree-nuts
  - meat
tags:
  - gluten-free
  - quick
  - snack
  - meat
  - pork
  - cheese
  - honey
  - nuts
mentions:
  - cuisine/san-marinese/side-dishes/piadina-sanmarinese
  - tutorials/spices/storage
ingredients:
  - qty: 1
    name: piadina sanmarinese
    raw: 1 freshly cooked piadina sanmarinese
  - qty: 60
    unit: g
