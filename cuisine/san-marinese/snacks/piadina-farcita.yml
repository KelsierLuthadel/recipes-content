    raw: 60 g squacquerone cheese
  - qty: 4
    name: prosciutto crudo
    raw: 4 thin slices prosciutto crudo
  - qty: 1
    unit: small handful
    name: rocket leaves
    raw: A small handful of rocket leaves
  - name: olive oil
    raw: A few drops of good olive oil
  - name: pepper (black)
    raw: A grind of black pepper
  - qty: 60
    unit: g
    name: ricotta and 1 fig
    raw: 60 g fresh ricotta and 1 fig, sliced, plus a drizzle of honey
  - qty: 4
    name: mortadella
    raw: 4 slices mortadella, 50 g stracchino, a few pistachios
  - name: rounds of grilled courgette and a slice of aged pecorino
    raw: A few rounds of grilled courgette and a slice of aged pecorino
