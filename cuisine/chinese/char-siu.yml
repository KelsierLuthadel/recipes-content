prep: 20 minutes (plus overnight marinade)
cook: 50 minutes
allergens:
  - dairy
  - soy
  - sesame
  - shellfish
  - meat
  - garlic
tags:
  - gluten-free
  - make-ahead
  - meals
  - asian
  - bbq
  - meat
  - pork
  - garlic
  - ginger
  - honey
  - soy-sauce
  - complex
  - lunar-new-year
mentions:
  - tutorials/pizza/sauce
  - tutorials/spices/storage
ingredients:
  - qty: 1.2
    unit: kg
    name: pork shoulder
    raw: 1.2 kg pork shoulder, cut into long strips 5 cm thick
  - qty: 3
    unit: tbsp
    name: hoisin sauce
    raw: 3 tbsp hoisin sauce
  - qty: 2
    unit: tbsp
    name: light soy sauce
    raw: 2 tbsp light soy sauce
  - qty: 1
    unit: tbsp
    name: dark soy sauce
    raw: 1 tbsp dark soy sauce
  - qty: 2
    unit: tbsp
    name: shaoxing rice wine
    raw: 2 tbsp Shaoxing rice wine
  - qty: 2
    unit: tbsp
    name: oyster sauce
    raw: 2 tbsp oyster sauce
  - qty: 2
    name: red fermented bean curd
    raw: 2 cubes red fermented bean curd , mashed
  - qty: 2
    unit: tbsp
    name: brown sugar
    raw: 2 tbsp brown sugar
  - qty: 1
    unit: tsp
    name: chinese five-spice powder
    raw: 1 tsp Chinese five-spice powder
  - qty: 4
    name: garlic cloves
    raw: 4 garlic cloves, grated
  - qty: 1
    name: ginger
    raw: 1 thumb fresh ginger, grated
  - qty: 1
    unit: tsp
    name: sesame oil
    raw: 1 tsp sesame oil
  - qty: 0.5
    unit: tsp
    name: white pepper
    raw: ½ tsp white pepper
  - name: "optional: ¼ tsp red yeast rice powder for colour"
    raw: "Optional: ¼ tsp red yeast rice powder for colour"
  - qty: 3
    unit: tbsp
    name: maltose syrup
    raw: 3 tbsp maltose syrup
  - qty: 2
    unit: tbsp
    name: honey
    raw: 2 tbsp honey
  - qty: 1
    unit: tbsp
    name: water
    raw: 1 tbsp hot water
