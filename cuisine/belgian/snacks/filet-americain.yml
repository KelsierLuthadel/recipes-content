prep: 25 minutes
cook: None (raw)
allergens:
  - gluten
  - eggs
  - meat
  - mustard
tags:
  - dairy-free
  - spicy
  - quick
  - snack
  - no-cook
  - meat
  - beef
  - eggs
  - onion
