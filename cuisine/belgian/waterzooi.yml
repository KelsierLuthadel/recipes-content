ingredients:
  - qty: 1
    name: free range chicken
    raw: 1 whole free-range chicken , jointed into 8 pieces
  - qty: 2
    name: leeks
    raw: 2 leeks , washed thoroughly and julienned
  - qty: 3
    name: carrots
    raw: 3 medium carrots, peeled and julienned
  - qty: 3
    name: celery
    raw: 3 stalks celery , julienned
  - qty: 1
    name: onions
    raw: 1 large onion, finely chopped
  - qty: 4
    unit: sprig
    name: thyme
    raw: 4 sprigs fresh thyme
  - qty: 2
    name: bay leaves
    raw: 2 bay leaves
  - qty: 6
    name: peppercorns (black)
    raw: 6 black peppercorns
  - qty: 6
    name: cloves
    raw: 6 cloves
  - qty: 1.2
    unit: l
    name: chicken stock
    raw: 1.2 litres good chicken stock
  - qty: 200
    unit: ml
    name: dry white wine
    raw: 200 ml dry white wine
  - qty: 60
    unit: g
    name: unsalted butter
    raw: 60 g unsalted butter
  - name: salt and white pepper
    raw: Salt and white pepper
  - qty: 3
    name: egg yolks
    raw: 3 large egg yolks
  - qty: 200
    unit: ml
    name: double cream
    raw: 200 ml double cream
  - qty: 1
    unit: tbsp
    name: lemon juice
    raw: 1 tablespoon lemon juice
  - qty: 30
    unit: g
    name: unsalted butter
    raw: 30 g unsalted butter, cubed and cold
  - qty: 1
    name: flat leaf parsley
    raw: 1 small bunch fresh flat-leaf parsley , leaves only, chopped
  - qty: 1
    unit: pinch
    name: nutmegs
    raw: Pinch of grated nutmeg
  - qty: 800
    unit: g
    name: new potatoes
    raw: 800 g small new potatoes, boiled in salted water and dressed with butter and chopped parsley
  - qty: 6
    name: country bread
    raw: 6 thick slices of country bread
  - qty: 1
    name: belgian witbier
    raw: 1 bottle of Belgian witbier OR a glass of dry Riesling
