prep: 15 minutes
cook: 25 minutes
allergens:
  - meat
  - garlic
tags:
  - dairy-free
  - gluten-free
  - spicy
  - make-ahead
  - sides
  - meat
  - onion
  - garlic
  - tomato
  - coriander
  - chili
  - complex
mentions:
  - cuisine/guatemalan/hilachas
  - cuisine/guatemalan/kakik
  - cuisine/guatemalan/pepian
  - cuisine/guatemalan/tamales-colorados
