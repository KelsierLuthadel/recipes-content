ingredients:
  - qty: 4
    name: guaque chillies
    raw: 4 dried guaque chillies
  - qty: 2
    name: pasa chillies
    raw: 2 dried pasa chillies
  - qty: 1
    name: chile cobanero
    raw: 1 dried chile cobanero
  - qty: 2
    unit: tbsp
    name: achiote seeds
    raw: 2 tbsp achiote seeds
  - qty: 100
    unit: ml
    name: warm chicken
    raw: 100 ml warm chicken or vegetable broth
  - qty: 4
    name: tomatoes
    raw: 4 large ripe tomatoes
  - qty: 4
    name: tomatillos
    raw: 4 tomatillos, husked
  - qty: 1
    name: onion (white)
    raw: 1 large white onion, halved
  - qty: 6
    name: garlic
    raw: 6 garlic cloves, skin on
  - qty: 1
    name: cinnamon sticks
    raw: 1 cinnamon stick
  - qty: 4
    name: cloves
    raw: 4 whole cloves
  - qty: 1
    unit: tsp
    name: coriander seeds
    raw: 1 tsp coriander seeds
  - qty: 1
    unit: tsp
    name: peppercorns (black)
    raw: 1 tsp black peppercorns
  - qty: 1
    unit: tsp
    name: allspice
    raw: 1 tsp ground allspice
  - qty: 1
    name: stale corn tortilla
    raw: 1 stale corn tortilla, torn
  - qty: 1
    unit: tsp
    name: salt
    raw: 1 tsp salt
  - qty: 2
    unit: tbsp
    name: lard
    raw: 2 tbsp lard or vegetable oil
