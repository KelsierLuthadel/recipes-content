prep: 5 minutes (plus 30 minutes soaking)
cook: 30 minutes
allergens:
  - dairy
  - tree-nuts
  - mustard
  - garlic
tags:
  - vegetarian
  - gluten-free
  - spicy
  - make-ahead
  - sides
  - onion
  - garlic
  - ginger
  - coconut
  - nuts
  - chili
  - curry
  - complex
mentions:
  - tutorials/spices/storage
  - base-ingredients/curry-powder/sri-lankan
ingredients:
  - qty: 250
    unit: g
    name: cashews
    raw: 250 g raw cashews
  - name: water
    raw: Boiling water
  - qty: 2
    unit: tbsp
    name: coconut oil
    raw: 2 tablespoons coconut oil
  - qty: 1
    name: onion
    raw: 1 small onion
  - qty: 3
    name: garlic
    raw: 3 garlic cloves
  - qty: 2
    name: ginger
    raw: 2 cm fresh ginger
  - qty: 1
    name: chilli (green)
    raw: 1 green chilli
  - qty: 1
    unit: tsp
    name: mustard seeds
    raw: 1 teaspoon mustard seeds
  - qty: 0.5
    unit: tsp
    name: fenugreek seeds
    raw: ½ teaspoon fenugreek seeds
  - qty: 1
    unit: sprig
    name: curry leaves
    raw: 1 sprig fresh curry leaves
  - qty: 1
    name: pandan leaf
    raw: 1 pandan leaf
  - qty: 1
    name: cinnamon stick
    raw: 1 cinnamon stick
  - qty: 1
    unit: tsp
    name: turmeric
    raw: 1 teaspoon ground turmeric
  - qty: 1
    unit: tsp
    name: sri lankan curry powder
    raw: 1 teaspoon Sri Lankan curry powder
  - qty: 1.5
    unit: tsp
    name: salt
    raw: 1 ½ teaspoons fine salt
  - qty: 200
    unit: ml
    name: water
    raw: 200 ml hot water
  - qty: 200
    unit: ml
    name: coconut milk
    raw: 200 ml thick coconut milk
