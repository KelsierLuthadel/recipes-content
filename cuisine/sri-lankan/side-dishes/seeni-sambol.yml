ingredients:
  - qty: 500
    unit: g
    name: red onions
    raw: 500 g red onions
  - qty: 4
    unit: tbsp
    name: coconut oil
    raw: 4 tablespoons coconut oil
  - qty: 1
    unit: sprig
    name: curry leaves
    raw: 1 sprig fresh curry leaves
  - qty: 1
    name: pandan leaf
    raw: 1 pandan leaf
  - qty: 1
    unit: tsp
    name: mustard seeds
    raw: 1 teaspoon mustard seeds
  - qty: 4
    unit: clove
    name: garlic
    raw: 4 cloves garlic
  - qty: 3
    name: ginger
    raw: 3 cm fresh ginger
  - qty: 1
    name: cinnamon stick
    raw: 1 cinnamon stick
  - qty: 2
    unit: tsp
    name: kashmiri chilli powder
    raw: 2 teaspoons Kashmiri chilli powder
  - qty: 1
    unit: tbsp
    name: maldive fish
    raw: 1 tablespoon Maldive fish
  - qty: 60
    unit: g
    name: jaggery or palm sugar
    raw: 60 g jaggery or palm sugar , substitute dark muscovado sugar
  - qty: 2
    unit: tbsp
    name: tamarind paste
    raw: 2 tablespoons tamarind paste
  - qty: 1.5
    unit: tsp
    name: salt
    raw: 1 ½ teaspoons fine salt
  - qty: 100
    unit: ml
    name: water
    raw: 100 ml hot water
