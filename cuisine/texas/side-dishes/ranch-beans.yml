prep: 15 minutes (plus overnight bean soaking)
cook: 2 hours
allergens:
  - meat
  - garlic
tags:
  - dairy-free
  - gluten-free
  - spicy
  - make-ahead
  - sides
  - meat
  - pork
  - onion
  - garlic
  - tomato
  - coriander
  - complex
mentions:
  - tutorials/bbq/brisket
  - tutorials/bbq/ribs
  - tutorials/charcuterie/bacon
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/spices/storage
ingredients:
  - qty: 500
    unit: g
    name: pinto beans
    raw: 500 g dried pinto beans
  - qty: 200
    unit: g
    name: smoked bacon
    raw: 200 g smoked bacon
  - qty: 2
    name: onions
    raw: 2 large onions
  - qty: 6
    name: garlic
    raw: 6 garlic cloves
  - qty: 2
    name: jalapenos
    raw: 2 fresh jalapeños
  - qty: 3
    name: tomatoes ;
    raw: 3 medium tomatoes ; or 1 tin chopped tomatoes
  - qty: 1
    name: mexican lager beer
    raw: 1 bottle Mexican lager beer
  - qty: 1.2
    unit: l
    name: beef stock
    raw: 1.2 litres hot beef stock
  - qty: 2
    unit: tbsp
    name: chili powder
    raw: 2 tablespoons chili powder
  - qty: 1
    unit: tbsp
    name: cumin
    raw: 1 tablespoon ground cumin
  - qty: 1
    unit: tbsp
    name: mexican oregano
    raw: 1 tablespoon dried Mexican oregano
  - qty: 1
    unit: tbsp
    name: smoked paprika
    raw: 1 tablespoon smoked paprika
  - qty: 2
    name: bay leaves
    raw: 2 bay leaves
  - qty: 1.5
    unit: tsp
    name: sea salt
    raw: 1 ½ teaspoons fine sea salt
  - qty: 1
    unit: tsp
    name: black pepper
    raw: 1 teaspoon ground black pepper
  - qty: 1
    name: coriander
    raw: 1 small bunch fresh coriander
