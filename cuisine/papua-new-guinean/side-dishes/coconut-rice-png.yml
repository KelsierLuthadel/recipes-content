prep: 5 minutes
cook: 20 minutes (plus 10 min rest)
allergens:
  - dairy
tags:
  - vegetarian
  - gluten-free
  - sides
  - rice
  - coconut
mentions:
  - cuisine/indian/rice/coconut-rice
  - cuisine/papua-new-guinean/mumu
  - cuisine/thai/side-dishes/coconut-rice
