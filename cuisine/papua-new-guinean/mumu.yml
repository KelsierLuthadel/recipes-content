    unit: g
    name: taro
    raw: 500 g taro, peeled and chunked
  - qty: 300
    unit: g
    name: aibika leaves
    raw: 300 g aibika leaves , or substitute spinach or kale
  - qty: 8
    name: banana leaves
    raw: 8 large banana leaves, softened over a flame
  - qty: 300
    unit: ml
    name: coconut cream
