prep: 30 minutes (plus overnight salt cure and 2 weeks pickling rest)
cook: 5 minutes
allergens:
  - mustard
tags:
  - vegetarian
  - vegan
  - dairy-free
  - gluten-free
  - spicy
  - make-ahead
  - sides
  - chili
mentions:
  - tutorials/cocktails/equipment
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/spices/storage
ingredients:
  - qty: 1
    name: cabbage (red)
    raw: 1 large red cabbage
  - qty: 2
    unit: tbsp
    name: sea salt
    raw: 2 tablespoons fine sea salt
  - qty: 600
    unit: ml
    name: cider vinegar
    raw: 600 ml cider vinegar
  - qty: 100
    unit: g
    name: soft light brown sugar
    raw: 100 g soft light brown sugar
  - qty: 2
    unit: tsp
    name: peppercorns (black)
    raw: 2 teaspoons whole black peppercorns
  - qty: 1
    unit: tsp
    name: cloves
    raw: 1 teaspoon whole cloves
  - qty: 1
    unit: tsp
    name: allspice berries
    raw: 1 teaspoon whole allspice berries
  - qty: 4
    name: bay leaves
    raw: 4 fresh bay leaves
  - qty: 1
    name: cinnamon sticks
    raw: 1 small cinnamon stick
  - qty: 1
    name: peel (orange)
    raw: 1 small piece dried orange peel
  - qty: 1
    unit: tsp
    name: mustard seed (yellow)
    raw: 1 teaspoon yellow mustard seed
  - qty: 1
    name: chilli (red)
    raw: 1 small fresh red chilli
