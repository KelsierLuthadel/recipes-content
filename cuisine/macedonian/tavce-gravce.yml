prep: 20 minutes (plus overnight bean soak)
cook: 2 hours 30 minutes
allergens:
  - gluten
  - garlic
tags:
  - vegetarian
  - vegan
  - dairy-free
  - spicy
  - make-ahead
  - meals
  - onion
  - garlic
  - tomato
  - chili
  - complex
mentions:
  - tutorials/cocktails/garnish
ingredients:
  - qty: 500
    unit: g
    name: tetovec
    raw: 500 g dried tetovec or large white beans
  - qty: 3
    name: bay leaves
    raw: 3 bay leaves
  - qty: 2
    name: onions
    raw: 2 large onions
  - qty: 6
    name: garlic
    raw: 6 garlic cloves
  - qty: 4
    unit: tbsp
    name: olive oil
    raw: 4 tablespoons olive oil
  - qty: 2
    unit: tbsp
    name: sweet paprika
    raw: 2 tablespoons sweet paprika
  - qty: 1
    unit: tbsp
    name: hot paprika
    raw: 1 tablespoon hot paprika
  - qty: 2
    unit: tbsp
    name: mint
    raw: 2 tablespoons dried mint
  - qty: 1
    unit: tbsp
    name: plain flour
    raw: 1 tablespoon plain flour
  - qty: 800
    unit: ml
    name: vegetable stock
    raw: 800 ml vegetable stock
  - qty: 1
    name: chilli (red)
    raw: 1 dried red chilli
  - qty: 2
    unit: tsp
    name: sea salt
    raw: 2 teaspoons fine sea salt
  - qty: 1
    unit: tsp
    name: cracked black pepper
    raw: 1 teaspoon coarsely cracked black pepper
  - qty: 2
    name: tomatoes
    raw: 2 fresh tomatoes OR 200 g tinned tomatoes
  - qty: 1
    name: parsley
    raw: 1 small bunch fresh parsley
