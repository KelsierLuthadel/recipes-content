prep: 30 minutes (plus 4 hours marinating)
cook: 25 minutes
allergens:
  - peanuts
  - fish
  - shellfish
  - meat
  - garlic
tags:
  - dairy-free
  - gluten-free
  - spicy
  - make-ahead
  - meals
  - meat
  - fish
  - pork
  - prawn
  - rice
  - onion
  - garlic
  - lime
  - coriander
  - nuts
  - chili
  - complex
mentions:
  - tutorials/charcuterie/sausages
  - tutorials/pizza/sauce
  - tutorials/spices/storage
ingredients:
  - qty: 1
    unit: kg
    name: pork shoulder
    raw: 1 kg pork shoulder, coarsely ground with about 25-30% visible fat content
  - qty: 4
    name: lemon grass
    raw: 4 stalks lemongrass , very finely chopped
  - qty: 8
    name: kaffir lime leaves
    raw: 8 kaffir lime leaves, central rib removed, leaves finely chopped
  - qty: 4
    name: galangal
    raw: 4 cm piece galangal, peeled and finely chopped
  - qty: 4
    name: turmeric
    raw: 4 cm piece fresh turmeric, peeled and finely chopped
  - qty: 8
    unit: clove
    name: garlic
    raw: 8 cloves garlic, finely chopped
  - qty: 4
    name: shallots
    raw: 4 shallots, finely chopped
  - qty: 4
    name: thai red chillies
    raw: 4 dried Thai red chillies, soaked in hot water 10 minutes, drained, finely chopped
  - qty: 2
    name: chillies (red)
    raw: 2 fresh red chillies, finely chopped
  - qty: 1
    name: dill
    raw: A small bunch fresh dill , finely chopped
  - qty: 1
    name: culantro
    raw: A small bunch culantro , finely chopped
  - qty: 4
    name: spring onions
    raw: 4 spring onions, finely sliced
  - qty: 3
    unit: tbsp
    name: fish sauce
    raw: 3 tablespoons fish sauce
  - qty: 2
    unit: tbsp
    name: padaek
    raw: 2 tablespoons padaek
  - qty: 1
    unit: tbsp
    name: palm sugar
    raw: 1 tablespoon palm sugar
  - qty: 1
    unit: tsp
    name: pepper (white)
    raw: 1 teaspoon ground white pepper
  - qty: 1
    unit: tbsp
    name: roasted rice powder
    raw: 1 tablespoon roasted rice powder
  - qty: 2
    name: metres natural pork sausage casings
    raw: 2 metres natural pork sausage casings
  - name: sausage stuffer attachment
    raw: A sausage stuffer attachment OR a wide piping nozzle attached to a piping bag
  - qty: 2
    unit: tbsp
    name: sunflower oil
    raw: 2 tablespoons sunflower oil
  - name: sticky rice in a small bamboo basket
    raw: Sticky rice in a small bamboo basket
  - name: jeow bong
    raw: A small dish of jeow bong
  - name: lettuce leaves
    raw: Fresh lettuce leaves, mint sprigs, basil sprigs, cilantro
  - name: cucumbers
    raw: Sliced cucumber, raw long beans, raw cabbage
  - name: roasted peanuts
    raw: A small dish of crushed roasted peanuts
  - name: lime wedges
    raw: Lime wedges
