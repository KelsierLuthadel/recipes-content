    name: banana
    raw: 1 ripe banana, sliced 1 cm thick
  - qty: 100
    unit: g
    name: taro
    raw: 100 g taro, peeled, diced 1.5 cm, boiled 12 minutes till just tender
  - qty: 80
    unit: g
    name: palm seeds
    raw: 80 g palm seeds
  - name: coconut flesh from one young coconut
    raw: Young coconut flesh from one young coconut, sliced
  - name: shaved ice
    raw: Shaved ice OR crushed ice
