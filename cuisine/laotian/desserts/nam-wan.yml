    raw: 2 pandan leaves, torn and knotted
  - qty: 0.25
    name: /4 teaspoon salt
    raw: 1/4 teaspoon salt
  - qty: 1
    unit: tsp
    name: vanilla extract
    raw: 1 teaspoon vanilla extract
  - qty: 100
    unit: g
    name: jackfruit
    raw: 100 g fresh jackfruit, chopped
  - qty: 100
    unit: g
    name: longan flesh
    raw: 100 g longan flesh , pitted
  - qty: 200
    unit: g
    name: sweet potato
    raw: 200 g sweet potato, peeled, diced 1.5 cm, boiled in salted water 8 minutes till just tender, drained
