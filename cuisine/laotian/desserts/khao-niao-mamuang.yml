prep: 15 minutes (plus overnight sticky rice soak)
cook: 25 minutes
allergens:
  - gluten
  - dairy
  - sesame
tags:
  - vegetarian
  - dessert
  - make-ahead
  - rice
  - coconut
  - honey
mentions:
  - cuisine/jamaican/snacks/festival
  - drinks/regional/china/jasmine-tea
  - tutorials/cocktails/garnish
  - tutorials/pizza/sauce
  - tutorials/spices/storage
ingredients:
  - qty: 1
    name: batch warm lao sticky rice
    raw: 1 batch warm Lao sticky rice
  - qty: 250
    unit: ml
    name: coconut milk
    raw: 250 ml full-fat coconut milk
  - qty: 60
    unit: g
    name: caster sugar
    raw: 60 g caster sugar
  - qty: 0.5
    name: /2 teaspoon salt
    raw: 1/2 teaspoon salt
  - qty: 1
    name: pandan leaf
    raw: 1 pandan leaf, torn and knotted
  - qty: 150
    unit: ml
    name: the thick "cream" from a chilled tin of coconut milk
    raw: 150 ml the thick "cream" from a chilled tin of coconut milk
  - qty: 1
    unit: tbsp
    name: caster sugar
    raw: 1 tablespoon caster sugar
  - qty: 0.25
    name: /4 teaspoon salt
    raw: 1/4 teaspoon salt
  - qty: 1
    unit: tsp
    name: rice flour
    raw: 1 teaspoon rice flour
  - qty: 2
    name: yellow-fleshed mangos
    raw: 2 large ripe yellow-fleshed mangos , peeled, stoned and sliced into 1 cm thick wedges
  - qty: 2
    unit: tbsp
    name: split yellow mung beans
    raw: 2 tablespoons split yellow mung beans, dry-toasted in a pan till golden and fragrant
  - name: or 2 tablespoons toasted sesame seeds
    raw: OR 2 tablespoons toasted sesame seeds
  - name: pandan-leaf-flavoured oils
    raw: A few fresh pandan-leaf-flavoured oils
