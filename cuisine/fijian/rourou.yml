ingredients:
  - qty: 500
    unit: g
    name: taro leaves
    raw: 500 g young taro leaves , stems removed and discarded, leaves sliced into 1 cm ribbons
  - qty: 3
    unit: tbsp
    name: coconut oil
    raw: 3 tbsp coconut oil
  - qty: 1
    name: onions
    raw: 1 large onion, finely chopped
  - qty: 4
    unit: clove
    name: garlic
    raw: 4 cloves garlic, minced
  - qty: 1
    name: ginger
    raw: 1 thumb of ginger, grated
  - qty: 1
    name: chilli (green)
    raw: 1 green chilli, finely chopped
  - qty: 1
    unit: tsp
    name: turmeric
    raw: 1 tsp ground turmeric
  - qty: 1
    unit: tsp
    name: madras style curry powder
    raw: 1 tsp Madras-style curry powder
  - qty: 0.5
    name: /2 tsp salt
    raw: 1/2 tsp salt
  - qty: 400
    unit: ml
    name: coconut milk
    raw: 400 ml coconut milk
  - qty: 100
    unit: ml
    name: coconut cream
    raw: 100 ml thick coconut cream
  - qty: 1
    name: limes
    raw: 1 lime, juiced
