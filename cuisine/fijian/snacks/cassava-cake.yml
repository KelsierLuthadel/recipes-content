prep: 20 minutes
cook: 50 minutes
allergens:
  - gluten
  - dairy
  - eggs
tags:
  - vegetarian
  - snack
  - eggs
  - coconut
  - butter
mentions:
  - cuisine/saint-lucian/desserts/cassava-pone
