prep: 10 minutes
cook: None (assumes pre-cooked meatballs)
allergens:
  - gluten
  - dairy
tags:
  - vegetarian
  - quick
  - snack
  - onion
  - butter
  - cream
  - cheese
mentions:
  - tutorials/pizza/toppings
  - tutorials/spices/storage
ingredients:
  - qty: 8
    name: swedish dark rye bread
    raw: 8 slices Swedish dark rye bread OR 4 large slices for closed sandwiches
  - qty: 60
    unit: g
    name: cold salted butter
    raw: 60 g cold salted butter
  - qty: 4
    unit: tbsp
    name: lingonberry preserves
    raw: 4 tablespoons lingonberry preserve
  - qty: 14
    name: cold swedish meatballs
    raw: 12-16 cold Swedish meatballs
  - qty: 0.5
    name: cucumbers
    raw: ½ cucumber
  - qty: 1
    name: onion (red)
    raw: 1 small red onion
  - qty: 1
    name: dill
    raw: 1 small bunch fresh dill or chives
  - qty: 4
    unit: tbsp
    name: soured cream
    raw: 4 tablespoons soured cream or crème fraîche
  - qty: 4
    name: swedish cheese
    raw: 4 slices mild Swedish cheese
  - name: pepper (black)
    raw: Ground black pepper
  - name: glass of milk
    raw: A cold glass of milk OR a small lager OR strong coffee
  - name: side of pickled beetroot
    raw: A side of pickled beetroot
  - name: or a side of pressgurka
    raw: Or a side of pressgurka
