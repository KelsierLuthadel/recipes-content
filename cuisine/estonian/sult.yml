    name: onions
    raw: 2 onions, peeled and halved
  - qty: 2
    name: carrots
    raw: 2 carrots, peeled
  - qty: 1
    name: garlic
    raw: 1 small head of garlic, halved across
  - qty: 2
    name: bay leaves
    raw: 2 bay leaves
  - qty: 10
    name: allspice berries
    raw: 10 allspice berries
  - qty: 10
    name: peppercorns (black)
    raw: 10 black peppercorns
  - qty: 1
    unit: tbsp
    name: salt
    raw: 1 tbsp salt, plus more to taste
  - qty: 2.5
    unit: l
    name: water
    raw: 2.5 litres cold water
  - name: estonian mustard
    raw: Estonian mustard
  - name: dark rye bread
    raw: Dark rye bread
  - name: pickled gherkins
    raw: Pickled gherkins
  - name: dill
    raw: Fresh dill
