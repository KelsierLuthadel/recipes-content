prep: 15 minutes (plus 1 hour rising)
cook: 20 minutes
allergens:
  - gluten
tags:
  - vegetarian
  - vegan
  - dairy-free
  - make-ahead
  - sides
  - complex
mentions:
  - cuisine/yemen/saltah
  - tutorials/pizza/dough
ingredients:
  - qty: 500
    unit: g
    name: plain flour
    raw: 500 g plain flour
  - qty: 1
    name: fast-action yeast
    raw: 1 sachet fast-action yeast
  - qty: 1
    unit: tsp
    name: salt
    raw: 1 teaspoon salt
  - qty: 1
    unit: tbsp
    name: caster sugar
    raw: 1 tablespoon caster sugar
  - qty: 1
    unit: tbsp
    name: olive oil
    raw: 1 tablespoon olive oil
  - qty: 300
    unit: ml
    name: water
    raw: 300 ml warm water
