    unit: g
    name: unsalted butter
    raw: 100 g unsalted butter
  - qty: 1
    unit: tbsp
    name: vegetable oil
    raw: 1 tablespoon vegetable oil
  - qty: 200
    unit: g
    name: dark honey
    raw: 200 g raw dark honey
  - qty: 1
    unit: tbsp
    name: black caraway
