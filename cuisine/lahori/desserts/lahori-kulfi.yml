prep: 15 minutes
cook: 1 hour (mostly hands-off reducing)
allergens:
  - dairy
  - tree-nuts
tags:
  - vegetarian
  - gluten-free
  - dessert
  - make-ahead
  - nuts
mentions:
  - tutorials/cocktails/equipment
  - tutorials/spices/storage
ingredients:
  - qty: 1.5
    unit: l
    name: milk
    raw: 1 ½ litres full-fat milk
  - qty: 80
    unit: g
    name: caster sugar
    raw: 80 g caster sugar
  - qty: 2
    unit: tbsp
    name: cornflour
    raw: 2 tablespoons cornflour
  - qty: 50
    unit: g
    name: pistachios
    raw: 50 g ground pistachios
  - qty: 0.5
    unit: tsp
    name: cardamom
    raw: ½ teaspoon ground cardamom
  - qty: 0.25
    unit: tsp
    name: saffron threads
    raw: ¼ teaspoon saffron threads
  - qty: 2
    unit: tbsp
    name: condensed milk (sweetened)
    raw: 2 tablespoons sweetened condensed milk
  - qty: 1
    unit: pinch
    name: salt
    raw: A pinch of salt
  - qty: 0.5
    unit: tsp
    name: rose water
    raw: ½ teaspoon rose water
  - qty: 30
    unit: g
    name: pistachios
    raw: 30 g pistachios
  - qty: 1.5
    name: sheets of silver leaf
    raw: 1-2 sheets of silver leaf
