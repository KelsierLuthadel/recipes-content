prep: 5 minutes
cook: 15 minutes
allergens:
  - dairy
tags:
  - vegetarian
  - quick
  - make-ahead
  - ginger
  - complex
mentions:
  - tutorials/middle-eastern-fundamentals/spices
ingredients:
  - qty: 1
    unit: l
    name: milk
    raw: 1 litre whole milk
  - qty: 1
    unit: generous pinch
    name: saffron threads
    raw: A generous pinch of good saffron threads
  - qty: 2
    unit: tbsp
    name: water
    raw: 2 tablespoons hot water
  - qty: 1
    name: cinnamon stick
    raw: 1 cinnamon stick
  - qty: 2
    name: star anise pods
    raw: 2 whole star anise pods
  - qty: 4
    name: cloves
    raw: 4 whole cloves
  - qty: 1
    name: ginger
    raw: 1 thin slice fresh ginger
  - qty: 0.25
    name: /4 teaspoon ground white pepper
    raw: 1/4 teaspoon ground white pepper
  - qty: 1
    name: cardamom pod
    raw: 1 cardamom pod
  - qty: 60
    unit: g
    name: soft dark brown sugar
    raw: 60 g soft dark brown sugar
  - qty: 2
    name: black tea bags or 2 tablespoons loose-leaf black tea
    raw: 2 black tea bags OR 2 tablespoons loose-leaf black tea
  - qty: 2
    unit: tbsp
    name: brandy
    raw: 2 tablespoons brandy, dark rum, or Dutch genever
  - name: saffron strands floated on top
    raw: A few extra saffron strands floated on top
  - name: nutmeg
    raw: A grating of fresh nutmeg
  - name: dollop of whipped cream
    raw: A small dollop of whipped cream
  - qty: 4
    name: heavy ceramic mugs
    raw: 4 small heavy ceramic mugs , pre-warmed
  - name: spoons for stirring
    raw: Small spoons for stirring
  - name: plate of speculaas
    raw: A small plate of speculaas, pepernoten, or taai-taai biscuits
  - name: wool blanket
    raw: A wool blanket
