prep: 30 minutes
cook: 30 minutes (plus 48 hours fermenting)
allergens:
  - gluten
tags:
  - vegetarian
  - vegan
  - dairy-free
  - make-ahead
  - lemon
  - complex
mentions:
  - tutorials/spices/storage
ingredients:
  - qty: 500
    unit: g
    name: stale rupjmaize
    raw: 500 g stale rupjmaize
  - qty: 3
    unit: l
    name: water
    raw: 3 litres boiling water
  - qty: 150
    unit: g
    name: caster sugar
    raw: 150 g caster sugar
  - qty: 8
    name: raisins
    raw: 8 raisins
  - qty: 5
    unit: g
    name: instant dried yeast
    raw: 5 g instant dried yeast
  - qty: 2
    unit: sprig
    name: mint or 1 strip lemon peel
    raw: 2 sprigs fresh mint or 1 strip lemon peel
  - qty: 1
    name: sugar
    raw: 1 extra tablespoon sugar
