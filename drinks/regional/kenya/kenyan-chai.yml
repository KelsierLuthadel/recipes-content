    raw: 2 cm piece of fresh ginger, sliced or smashed
  - qty: 2
    name: sugar
    raw: 2 to 4 tbsp sugar
  - name: cinnamon sticks
    raw: A small cinnamon stick
  - qty: 1
    unit: pinch
    name: pepper (black)
    raw: A pinch of ground black pepper
