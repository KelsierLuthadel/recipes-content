prep: 5 minutes
cook: 10 minutes (plus chilling)
allergens:
  - gluten
  - dairy
  - soy
  - sesame
tags:
  - vegetarian
  - quick
mentions:
  - tutorials/spices/storage
ingredients:
  - qty: 30
    unit: g
    name: thai oliang powder
    raw: 30 g Thai oliang powder OR 4 tablespoons strong dark-roast ground coffee + 1 tablespoon toasted black sesame seeds + 1 tablespoon roasted soybean flour
  - qty: 600
    unit: ml
    name: water
    raw: 600 ml boiling water
  - qty: 4
    unit: tbsp
    name: caster sugar
    raw: 4 tablespoons caster sugar
  - name: plenty of crushed ice
    raw: Plenty of crushed ice
  - qty: 4
    unit: tbsp
    name: evaporated milk
    raw: 4 tablespoons evaporated milk
  - qty: 2
    unit: tbsp
    name: condensed milk (sweetened)
    raw: 2 tablespoons sweetened condensed milk
  - qty: 2
    name: tall glasses
    raw: 2 tall glasses, chilled
  - name: long handled spoons
    raw: Long-handled spoons or wide straws
