    name: blossom water (orange)
    raw: 1 to 2 teaspoons orange blossom water
  - qty: 2
    unit: tbsp
    name: almonds
    raw: 2 tablespoons ground almonds
  - qty: 1
    unit: handful
    name: ice cubes
    raw: A handful of ice cubes
  - qty: 2
    unit: tbsp
    name: pistachios
    raw: 2 tablespoons crushed pistachios or chopped almonds
  - qty: 1
    unit: small pinch
    name: cinnamon
    raw: A small pinch of ground cinnamon
  - qty: 4
    name: tall glasses
    raw: 4 tall glasses, chilled
