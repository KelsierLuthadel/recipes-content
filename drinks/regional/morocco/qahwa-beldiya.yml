prep: 3 minutes
cook: 6 minutes
allergens:
  - sesame
tags:
  - vegetarian
  - vegan
  - dairy-free
  - gluten-free
  - quick
  - ginger
mentions:
  - drinks/regional/arabia/qahwa
  - equipment/mortar-and-pestle
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/spices/storage
ingredients:
  - qty: 50
    unit: g
    name: cardamom pods (green)
    raw: 50 g whole green cardamom pods
  - qty: 3
    name: cinnamon sticks
    raw: 3 cinnamon sticks
  - qty: 1
    name: nutmeg
    raw: 1 small whole nutmeg, lightly cracked
  - qty: 1
    unit: tsp
    name: peppercorns (black)
    raw: 1 teaspoon black peppercorns
  - qty: 1
    unit: tbsp
    name: sesame seeds (white)
    raw: 1 tablespoon white sesame seeds
  - qty: 4
    name: cloves
    raw: 4 whole cloves
  - qty: 1
    unit: tbsp
    name: aniseed
    raw: 1 tablespoon aniseed
  - qty: 2
    name: ginger
    raw: 2 cm fresh ginger, sliced and dried
  - qty: 4
    unit: tbsp
    name: medium dark arabica ground coffee
    raw: 4 tablespoons medium-dark Arabica ground coffee
  - qty: 1
    name: the spice blend above
    raw: 1 to 2 teaspoons of the spice blend above
  - qty: 600
    unit: ml
    name: water
    raw: 600 ml cold water
  - qty: 4
    name: white
    raw: 4 to 6 teaspoons white or brown sugar, to taste
  - qty: 4
    name: porcelain cups
    raw: 4 small porcelain cups or espresso cups with saucers
  - name: optional
    raw: "Optional: a small plate of dates or kaab el ghazal pastries"
