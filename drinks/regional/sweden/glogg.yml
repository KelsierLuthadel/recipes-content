prep: 15 minutes (plus 24 hours steeping for the spice infusion if you want depth)
cook: 20 minutes
allergens:
  - tree-nuts
tags:
  - vegetarian
  - vegan
  - dairy-free
  - gluten-free
  - make-ahead
  - ginger
  - lemon
  - nuts
  - complex
mentions:
  - drinks/classic/elderflower-cordial
  - drinks/hot/mulled-wine
  - drinks/regional/germany/gluhwein
  - tutorials/cocktails/equipment
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/spices/storage
ingredients:
  - qty: 1.5
    unit: l
    name: dry red wine
    raw: 1.5 litres dry red wine
  - qty: 300
    unit: ml
    name: akvavit
    raw: 300 ml akvavit OR vodka OR brandy
  - qty: 150
    unit: ml
    name: port
    raw: 150 ml port or sweet sherry
  - qty: 150
    unit: g
    name: caster sugar
    raw: 150 g caster sugar
  - qty: 1
    unit: stick
    name: cinnamon
    raw: 1 stick cinnamon
  - qty: 10
    name: cardamom pods
    raw: 10 whole cardamom pods
  - qty: 10
    name: cloves
    raw: 10 whole cloves
  - qty: 8
    name: allspice berries
    raw: 8 allspice berries
  - qty: 1
    name: ginger
    raw: 1 thumb fresh ginger
  - name: orange
    raw: Peel of 1 large orange
  - name: ½ lemon
    raw: Peel of ½ lemon
  - qty: 1
    name: vanilla pod
    raw: 1 vanilla pod
  - qty: 1
    unit: tbsp
    name: dark raisins
    raw: 1 tablespoon dark raisins
  - qty: 1
    unit: tbsp
    name: blanched whole almonds
    raw: 1 tablespoon blanched whole almonds
  - qty: 1
    unit: tsp
    name: sugar (brown)
    raw: 1 teaspoon brown sugar
