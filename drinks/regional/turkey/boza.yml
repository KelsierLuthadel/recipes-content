prep: 20 minutes (plus 48 hours fermentation)
cook: 30 minutes
allergens:
  - dairy
tags:
  - vegetarian
  - gluten-free
  - make-ahead
  - yogurt
  - chickpea
  - complex
mentions:
  - tutorials/spices/storage
ingredients:
  - qty: 150
    unit: g
    name: millet
    raw: 150 g millet
  - qty: 1.5
    unit: l
    name: water
    raw: 1.5 litres water
  - qty: 150
    unit: g
    name: caster sugar
    raw: 150 g caster sugar
  - qty: 1
    unit: tsp
    name: active dry yeast or 2 tablespoons of plain whole-milk yogurt
    raw: 1 teaspoon active dry yeast OR 2 tablespoons of plain whole-milk yogurt
  - qty: 2
    unit: tsp
    name: cinnamon
    raw: 2 teaspoons ground cinnamon
  - qty: 8
    name: heatproof glasses
    raw: 8 small heatproof glasses
  - qty: 100
    unit: g
    name: leblebi - turkish brand at any turkish grocery; or substitute with roasted chickpeas
    raw: 100 g leblebi - Turkish brand at any Turkish grocery; or substitute with roasted chickpeas
  - name: cinnamon for dusting
    raw: Ground cinnamon for dusting
