ingredients:
  - qty: 1
    name: aalborg taffel akvavit
    raw: 1 bottle Aalborg Taffel Akvavit OR Aalborg Jubilæum
  - qty: 700
    unit: ml
    name: clear neutral vodka
    raw: 700 ml clear neutral vodka
  - qty: 4
    unit: tbsp
    name: caraway seeds
    raw: 4 tablespoons caraway seeds
  - qty: 2
    unit: tbsp
    name: dill seeds
    raw: 2 tablespoons dill seeds
  - qty: 1
    unit: tbsp
    name: fennel seeds
    raw: 1 tablespoon fennel seeds
  - qty: 1
    unit: tsp
    name: coriander seeds
    raw: 1 teaspoon coriander seeds
  - name: lemon
    raw: Peel of 1 lemon
  - name: sweet gale if available
    raw: A small piece of sweet-gale if available, the Danish bog plant; or substitute juniper berries
  - qty: 1
    unit: tbsp
    name: caster sugar
    raw: 1 tablespoon caster sugar
