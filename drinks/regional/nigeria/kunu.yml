prep: 15 minutes (plus 8 hours millet soak)
cook: 10 minutes
allergens:
  - gluten
tags:
  - vegetarian
  - dairy-free
  - spicy
  - make-ahead
  - ginger
  - honey
  - chili
  - complex
mentions:
  - drinks/regional/nigeria/zobo
  - tutorials/spices/storage
ingredients:
  - qty: 250
    unit: g
    name: millet
    raw: 250 g whole millet
  - qty: 2
    unit: tbsp
    name: rice flour
    raw: 2 tablespoons rice flour
  - qty: 1.5
    unit: l
    name: water
    raw: 1.5 litres cold water
  - qty: 80
    unit: g
    name: ginger
    raw: 80 g fresh ginger, peeled and sliced
  - qty: 8
    name: cloves
    raw: 8 whole cloves
  - qty: 1
    name: bird's-eye chilli
    raw: 1 small bird's-eye chilli, deseeded
  - qty: 6
    name: black peppercorns
    raw: 6 black peppercorns
  - qty: 3
    name: to 4 tablespoons sugar
    raw: 3 to 4 tablespoons sugar , to taste - kunu is properly only lightly sweet
  - qty: 1
    unit: pinch
    name: salt
    raw: A pinch of fine salt
  - name: ice cubes
    raw: Ice cubes
  - qty: 4
    name: to 6 tall glasses or small calabash bowls
    raw: 4 to 6 tall glasses or small calabash bowls
