prep: 2 minutes
cook: 12 minutes
allergens:
  - gluten
  - dairy
  - tree-nuts
tags:
  - vegetarian
  - quick
  - coconut
  - nuts
mentions:
  - cuisine/israel/snacks/bourekas
  - drinks/regional/turkey/salep
  - tutorials/cocktails/garnish
  - tutorials/pizza/toppings
  - tutorials/spices/storage
ingredients:
  - qty: 2
    unit: tbsp
    name: sahlab powder
    raw: 2 tablespoons sahlab powder OR 2 tablespoons cornflour + 1 tablespoon milk powder
  - qty: 1
    unit: l
    name: milk
    raw: 1 litre whole milk
  - qty: 60
    unit: g
    name: caster sugar
    raw: 60 g caster sugar
  - qty: 1
    unit: tsp
    name: vanilla extract
    raw: 1 teaspoon vanilla extract
  - qty: 1
    unit: tsp
    name: rose water
    raw: 1 teaspoon rose water
  - qty: 4
    unit: tbsp
    name: unsalted pistachios
    raw: 4 tablespoons crushed unsalted pistachios
  - qty: 4
    unit: tbsp
    name: desiccated coconut
    raw: 4 tablespoons desiccated coconut
  - qty: 2
    unit: tsp
    name: cinnamon
    raw: 2 teaspoons ground cinnamon
  - qty: 2
    unit: tbsp
    name: sultanas
    raw: 2 tablespoons sultanas or raisins
  - qty: 1
    unit: small pinch
    name: saffron strands
    raw: A small pinch of saffron strands
  - qty: 4
    name: heatproof mugs
    raw: 4 small heatproof mugs, warmed
  - name: optional
    raw: "Optional: a thin biscuit on the saucer"
