    name: sugar (white)
    raw: 4 to 6 teaspoons white sugar, to taste
  - qty: 3
    name: ice cubes
    raw: 3 ice cubes
  - qty: 2
    unit: tbsp
    name: pistachios (unsalted)
    raw: 2 tablespoons crushed unsalted pistachios
  - qty: 1
    unit: small pinch
    name: cardamom
    raw: A small pinch of ground cardamom
  - qty: 4
    name: heatproof cups
