prep: 10 minutes (plus 24 hours steeping)
cook: 15 minutes
allergens: []
tags:
  - vegetarian
  - vegan
  - dairy-free
  - gluten-free
  - make-ahead
  - ginger
  - lime
  - complex
mentions:
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/spices/storage
ingredients:
  - qty: 200
    unit: g
    name: sorrel calyces
    raw: 200 g dried sorrel calyces
  - qty: 2
    unit: l
    name: water
    raw: 2 litres boiling water
  - qty: 1
    name: ginger
    raw: 1 large thumb fresh ginger, sliced into coins
  - qty: 6
    name: cloves
    raw: 6 whole cloves
  - qty: 1
    name: cinnamon sticks
    raw: 1 large cinnamon stick
  - qty: 1
    name: strip orange peel
    raw: 1 strip orange peel
  - qty: 1
    name: strip lime peel
    raw: 1 strip lime peel
  - qty: 250
    unit: g
    name: caster sugar
    raw: 250 g caster sugar
  - qty: 4
    unit: tbsp
    name: dark rum per glass for the adult pour
    raw: 4 tbsp dark rum per glass for the adult pour
  - qty: 1
    unit: tsp
    name: angostura bitters
    raw: 1 tsp Angostura bitters
