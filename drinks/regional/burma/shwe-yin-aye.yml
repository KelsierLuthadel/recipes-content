prep: 25 minutes (assumes the toppings are pre-prepared)
cook: 15 minutes
allergens:
  - gluten
  - dairy
tags:
  - vegetarian
  - coconut
mentions:
  - tutorials/pizza/toppings
  - tutorials/spices/storage
ingredients:
  - qty: 100
    unit: g
    name: pearl tapioca
    raw: 100 g small pearl tapioca
  - qty: 1
    name: block of agar agar powder
    raw: 1 small block of agar agar powder, prepared as jelly - or 200 g pre-made jelly cubes
  - qty: 4
    name: plain white bread
    raw: 4 thick slices of plain white bread
  - qty: 2
    unit: tbsp
    name: coconut flesh
    raw: 2 tablespoons fresh young coconut flesh
  - qty: 400
    unit: ml
    name: coconut milk
    raw: 400 ml coconut milk
  - qty: 80
    unit: g
    name: caster sugar
    raw: 80 g caster sugar
  - qty: 1
    unit: pinch
    name: salt
    raw: A pinch of fine salt
  - qty: 1
    name: pandan leaf
    raw: 1 pandan leaf, knotted
  - name: plenty of crushed ice
    raw: Plenty of crushed ice
  - qty: 4
    name: vanilla or coconut ice cream
    raw: 4 small scoops of vanilla or coconut ice cream
  - qty: 4
    name: tall glasses
    raw: 4 tall glasses, chilled
