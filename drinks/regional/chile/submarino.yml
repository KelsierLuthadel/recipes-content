prep: 1 minute
cook: 6 minutes
allergens:
  - dairy
tags:
  - vegetarian
  - gluten-free
  - quick
  - hot
  - chocolate
ingredients:
  - qty: 600
    unit: ml
    name: whole milk
    raw: 600 ml whole milk
  - qty: 100
    unit: g
    name: dark chocolate
    raw: 100 g dark chocolate (60-70% cocoa)
  - qty: 2
    unit: tsp
    name: sugar
    raw: 2 to 4 teaspoons sugar
  - qty: 1
    unit: pinch
    name: fine salt
    raw: A pinch of fine salt
  - qty: 0.5
    unit: tsp
    name: vanilla extract
    raw: 1/2 teaspoon vanilla extract (optional)
  - qty: 0.25
    unit: tsp
    name: ground cinnamon
    raw: 1/4 teaspoon ground cinnamon (optional)
