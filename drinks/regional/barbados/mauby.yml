prep: 15 minutes (plus 12 hours steeping)
cook: 30 minutes
allergens:
  - gluten
  - fish
tags:
  - dairy-free
  - make-ahead
  - fish
  - ginger
  - coconut
  - lemon
  - lime
  - complex
mentions:
  - drinks/classic/lemonade
  - drinks/cocktails/rum-punch
  - tutorials/middle-eastern-fundamentals/spices
ingredients:
  - qty: 30
    unit: g
    name: mauby bark
    raw: 30 g dried mauby bark
  - qty: 2
    name: cinnamon sticks
    raw: 2 cinnamon sticks
  - qty: 6
    name: cloves
    raw: 6 whole cloves
  - qty: 2
    name: star anise pods
    raw: 2 star anise pods
  - qty: 4
    name: bay leaves
    raw: 4 bay leaves
  - qty: 1
    name: strip orange peel
    raw: 1 strip orange peel
  - qty: 1
    name: strip lemon peel
    raw: 1 strip lemon peel
  - qty: 1
    name: ginger
    raw: 1 thick slice of fresh ginger
  - qty: 5
    name: allspice berries
    raw: 4-6 whole allspice berries
  - qty: 1.5
    unit: l
    name: water
    raw: 1.5 litres cold water
  - qty: 175
    unit: g
    name: granulated sugar
    raw: 150-200 g granulated sugar
  - qty: 1
    unit: tbsp
    name: lime juice
    raw: 1 tablespoon fresh lime juice
  - name: tall glass filled with ice cubes
    raw: Tall glass filled with ice cubes
  - name: lime
    raw: A slice of lime
  - qty: 1
    unit: sprig
    name: mint
    raw: A sprig of mint
  - name: bajan fish cakes
    raw: Bajan fish cakes, conkies, or a slice of coconut bread
