prep: 5 minutes
cook: 12 minutes
allergens:
  - dairy
tags:
  - vegetarian
  - gluten-free
  - quick
  - make-ahead
  - ginger
mentions:
  - tutorials/middle-eastern-fundamentals/spices
  - tutorials/spices/storage
ingredients:
  - qty: 600
    unit: ml
    name: water
    raw: 600 ml water
  - qty: 400
    unit: ml
    name: milk
    raw: 400 ml whole milk
  - qty: 4
    unit: tsp
    name: tea (black)
    raw: 4 teaspoons strong black tea
  - qty: 4
    name: ginger
    raw: 4 cm fresh ginger, sliced thin
  - qty: 6
    name: cardamom pods (green)
    raw: 6 green cardamom pods, lightly crushed
  - qty: 1
    name: cinnamon stick
    raw: 1 cinnamon stick
  - qty: 4
    name: cloves
    raw: 4 whole cloves
  - qty: 6
    name: peppercorns (black)
    raw: 6 black peppercorns
  - qty: 1
    name: star anise
    raw: 1 star anise
  - qty: 4
    name: sugar
    raw: 4 to 6 teaspoons sugar, to taste
  - qty: 4
    name: porcelain cups
    raw: 4 small porcelain cups or glass tumblers
