    raw: 2 to 3 tablespoons honey
  - qty: 0.25
    unit: tsp
    name: vanilla extract
    raw: 1/4 teaspoon vanilla extract (optional)
  - qty: 1
    unit: pinch
    name: fine salt
    raw: A small pinch of fine salt
  - qty: 1
    unit: pinch
    name: saffron
    raw: A tiny pinch of saffron strands (optional)
